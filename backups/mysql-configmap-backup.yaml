    its affiliates.\n#\n# This program is free software; you can redistribute it and/or
    modify\n# it under the terms of the GNU General Public License as published by\n#
    the Free Software Foundation; version 2 of the License.\n#\n# This program is
    distributed in the hope that it will be useful,\n# but WITHOUT ANY WARRANTY; without
    even the implied warranty of\n# MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.
    \ See the\n# GNU General Public License for more details.\n#\n# You should have
    received a copy of the GNU General Public License\n# along with this program;
    if not, write to the Free Software\n# Foundation, Inc., 51 Franklin St, Fifth
    Floor, Boston, MA  02110-1301 USA\nset -e\n\nif [[ -n $MYSQL_USER_FILE && -f $MYSQL_USER_FILE
    ]]; then\n    MYSQL_USER=$(cat $MYSQL_USER_FILE)\nfi\n\nif [ \"$1\" = 'mysqlrouter'
    ]; then\n    if [[ -z $MYSQL_HOST || -z $MYSQL_PORT || -z $MYSQL_USER || (-z $MYSQL_PASSWORD
    && -z $MYSQL_PASSWORD_FILE) ]]; then\n\t    echo \"We require all of\"\n\t    echo
    \"    MYSQL_HOST\"\n\t    echo \"    MYSQL_PORT\"\n\t    echo \"    MYSQL_USER
    or MYSQL_USER_FILE\"\n\t    echo \"    MYSQL_PASSWORD or MYSQL_PASSWORD_FILE\"\n\t
    \   echo \"to be set.\"\n\t    echo \"In addition you can set\"\n\t    echo \"
    \   MYSQL_INNODB_CLUSTER_MEMBERS\"\n\t    echo \"    MYSQL_CREATE_ROUTER_USER\"\n\t
    \   echo \"    MYSQL_ROUTER_BOOTSTRAP_EXTRA_OPTIONS\"\n\t    echo \"Exiting.\"\n\t
    \   exit 1\n    fi\n\n    PASSFILE=$(mktemp)\n    if  [[ -n $MYSQL_PASSWORD_FILE
    && -f \"$MYSQL_PASSWORD_FILE\" ]]; then\n        cat \"$MYSQL_PASSWORD_FILE\"
    > \"$PASSFILE\"\n        echo \"\" >> \"$PASSFILE\"\n    else\n        echo \"$MYSQL_PASSWORD\"
    > \"$PASSFILE\"\n    fi\n    if [ -z $MYSQL_CREATE_ROUTER_USER ]; then\n      if
    \ [[ -n $MYSQL_PASSWORD_FILE && -f \"$MYSQL_PASSWORD_FILE\" ]]; then\n        cat
    \"$MYSQL_PASSWORD_FILE\" >> \"$PASSFILE\"\n        echo \"\" >> \"$PASSFILE\"\n
    \     else\n        echo \"$MYSQL_PASSWORD\" >> \"$PASSFILE\"\n      fi\n      MYSQL_CREATE_ROUTER_USER=1\n
    \     echo \"[Entrypoint] MYSQL_CREATE_ROUTER_USER is not set, Router will generate
    a new account to be used at runtime.\"\n      echo \"[Entrypoint] Set it to 0
    to reuse $MYSQL_USER instead.\"\n    elif [ \"$MYSQL_CREATE_ROUTER_USER\" = \"0\"
    ]; then\n      if  [[ -n $MYSQL_PASSWORD_FILE && -f \"$MYSQL_PASSWORD_FILE\" ]];
    then\n        cat \"$MYSQL_PASSWORD_FILE\" >> \"$PASSFILE\"\n        echo \"\"
    >> \"$PASSFILE\"\n      else\n        echo \"$MYSQL_PASSWORD\" >> \"$PASSFILE\"\n
    \     fi\n      echo \"[Entrypoint] MYSQL_CREATE_ROUTER_USER is 0, Router will
    reuse $MYSQL_USER account at runtime\"\n    else\n      echo \"[Entrypoint] MYSQL_CREATE_ROUTER_USER
    is not 0, Router will generate a new account to be used at runtime\"\n    fi\n\n
    \   if  [[ -n $MYSQL_PASSWORD_FILE && -f \"$MYSQL_PASSWORD_FILE\" ]]; then\n      DEFAULTS_EXTRA_FILE=$(mktemp)\n
    \     cat >\"$DEFAULTS_EXTRA_FILE\" <<EOF\n[client]\npassword=\"$(cat $MYSQL_PASSWORD_FILE)\"\nEOF\n
    \   else\n      DEFAULTS_EXTRA_FILE=$(mktemp)\n      cat >\"$DEFAULTS_EXTRA_FILE\"
    <<EOF\n[client]\npassword=\"$MYSQL_PASSWORD\"\nEOF\n    fi\n    unset MYSQL_PASSWORD\n\n
    \   max_tries=12\n    attempt_num=0\n    until (echo > \"/dev/tcp/$MYSQL_HOST/$MYSQL_PORT\")
    >/dev/null 2>&1; do\n      echo \"[Entrypoint] Waiting for mysql server $MYSQL_HOST
    ($attempt_num/$max_tries)\"\n      sleep $(( attempt_num++ ))\n      if (( attempt_num
    == max_tries )); then\n        exit 1\n      fi\n    done\n    echo \"[Entrypoint]
    Succesfully contacted mysql server at $MYSQL_HOST:$MYSQL_PORT. Checking for cluster
    state.\"\n    if ! [[ \"$(mysql --defaults-extra-file=\"$DEFAULTS_EXTRA_FILE\"
    -u \"$MYSQL_USER\" -h \"$MYSQL_HOST\" -P \"$MYSQL_PORT\" -e \"show status;\" 2>
    /dev/null)\" ]]; then\n      echo \"[Entrypoint] ERROR: Can not connect to database.
    Exiting.\"\n      exit 1\n    fi\n    if [[ -n $MYSQL_INNODB_CLUSTER_MEMBERS ]];
    then\n      attempt_num=0\n      echo $attempt_num\n      echo $max_tries\n      until
    [ \"$(mysql --defaults-extra-file=\"$DEFAULTS_EXTRA_FILE\" -u \"$MYSQL_USER\"
    -h \"$MYSQL_HOST\" -P \"$MYSQL_PORT\" -N performance_schema -e \"select count(MEMBER_STATE)
    >= $MYSQL_INNODB_CLUSTER_MEMBERS from replication_group_members where MEMBER_STATE
    = 'ONLINE';\" 2> /dev/null)\" -eq 1 ]; do\n             echo \"[Entrypoint] Waiting
    for $MYSQL_INNODB_CLUSTER_MEMBERS cluster instances to become available via $MYSQL_HOST
    ($attempt_num/$max_tries)\"\n             sleep $(( attempt_num++ ))\n             if
    (( attempt_num == max_tries )); then\n                     exit 1\n             fi\n
    \     done\n      echo \"[Entrypoint] Successfully contacted cluster with $MYSQL_INNODB_CLUSTER_MEMBERS
    members. Bootstrapping.\"\n    fi\n    if [ $(id -u) = \"0\" ]; then\n      opt_user=--user=mysqlrouter\n
    \   fi\n    if [ \"$MYSQL_CREATE_ROUTER_USER\" = \"0\" ]; then\n        echo \"[Entrypoint]
    Succesfully contacted mysql server at $MYSQL_HOST. Trying to bootstrap reusing
    account \\\"$MYSQL_USER\\\".\"\n        mysqlrouter --bootstrap \"$MYSQL_USER@$MYSQL_HOST:$MYSQL_PORT\"
    --directory /tmp/mysqlrouter --force --account-create=never --account=$MYSQL_USER
    $opt_user $MYSQL_ROUTER_BOOTSTRAP_EXTRA_OPTIONS < \"$PASSFILE\" || exit 1\n    else\n
    \       echo \"[Entrypoint] Succesfully contacted mysql server at $MYSQL_HOST.
    Trying to bootstrap.\"\n        mysqlrouter --bootstrap \"$MYSQL_USER@$MYSQL_HOST:$MYSQL_PORT\"
    --directory /tmp/mysqlrouter --force $opt_user $MYSQL_ROUTER_BOOTSTRAP_EXTRA_OPTIONS
    < \"$PASSFILE\" || exit 1\n    fi\n\n    rm \"$DEFAULTS_EXTRA_FILE\"\n\n    sed
    -i -e 's/logging_folder=.*$/logging_folder=/' /tmp/mysqlrouter/mysqlrouter.conf\n
    \   echo \"[Entrypoint] Starting mysql-router.\"\n    exec \"$@\" --config /tmp/mysqlrouter/mysqlrouter.conf\n\n
    \   rm $PASSFILE\nelse\n    exec \"$@\"\nfi\n"
