apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crawler-tool-dev
  namespace: argocd
spec:
  project: marketplace
  source:
    repoURL: https://github.com/electgo/crawler-tool
    targetRevision: develop
    path: helm/crawler-tool
    helm:
      valueFiles:
        - values-dev.yaml
      parameters:
        - name: env.config.REDIS_BATCH_SIZE
          value: "100"
        - name: env.config.REDIS_TTL_SECONDS
          value: "3600"
        - name: imageCredentials.create
          value: "true"
        - name: env.secret.MONGODB_URI
          value: "mongodb://sharedops:__REDACTED_SHAREDOPS_PASSWORD__@mongodb.database.svc.cluster.local:27017/electgo?authSource=admin"
        - name: env.secret.REDIS_URL
          value: "redis://:__REDACTED_SHAREDOPS_PASSWORD__@redis.database.svc.cluster.local:6379"
        - name: env.secret.REDIS_PASSWORD
          value: "__REDACTED_SHAREDOPS_PASSWORD__"
        - name: imageCredentials.password
          value: "ElectGoregzot134"
        - name: imageCredentials.username
          value: "admin"
  destination:
    server: https://10.20.17.100:6443
    namespace: crawler-tool
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: true
