apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-sku-finder-prod
  namespace: argocd
spec:
  project: product
  source:
    repoURL: https://github.com/electgo/pim-sku-finder
    targetRevision: main
    path: deployments/helm
    helm:
      releaseName: pim-sku-finder
      valueFiles:
        - values-prod.yaml
      parameters:
        - name: secret.manage
          value: "true"
  destination:
    name: production
    namespace: pim-sku-finder
  syncPolicy:
    automated:
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
