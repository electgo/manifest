apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-prod
  namespace: argocd
spec:
  project: product
  destination:
    name: production
    namespace: n8n
  source:
    path: argo/n8n-prod
    repoURL: https://github.com/electgo/manifest.git
    targetRevision: main
    directory:
      recurse: false
  # Secrets `n8n-secrets` and `n8n-db` are out-of-band (not in git); Argo does not
  # manage them. No prune: PVC n8n-data holds config/community nodes.
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
