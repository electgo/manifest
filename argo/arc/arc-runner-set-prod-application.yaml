apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-set-prod
  namespace: argocd
spec:
  destination:
    name: production
    namespace: arc-runners
  project: platform
  source:
    chart: gha-runner-scale-set
    helm:
      releaseName: eks-arm64
      values: |-
        githubConfigUrl: https://github.com/electgo
        githubConfigSecret: gh-app-secret
        runnerScaleSetName: eks-arm64
        minRunners: 0
        maxRunners: 7
        runnerGroup: default
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-gha-rs-controller
        containerMode:
          type: ''
        template:
          spec:
            serviceAccountName: arc-runner-sa
            imagePullSecrets:
              - name: registry-docker-config
            nodeSelector:
              kubernetes.io/arch: arm64
              kubernetes.io/os: linux
            terminationGracePeriodSeconds: 120
            securityContext:
              fsGroup: 1001
            initContainers:
              - name: buildctl-init
                image: moby/buildkit:v0.13.2-rootless
                command:
                  - sh
                  - -c
                  - cp /usr/bin/buildctl /shared/buildctl && chmod +x /shared/buildctl
                volumeMounts:
                  - name: buildctl-bin
                    mountPath: /shared
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:2.334.0
                command:
                  - /home/runner/run.sh
                env:
                  - name: BUILDKIT_HOST
                    value: tcp://127.0.0.1:1234
                  - name: DOCKER_CONFIG
                    value: /home/runner/.docker
                volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
                  - name: buildctl-bin
                    mountPath: /usr/local/bin/buildctl
                    subPath: buildctl
                  - name: docker-config
                    mountPath: /home/runner/.docker
                    readOnly: true
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: '1'
                    memory: 1Gi
              - name: buildkitd
                image: moby/buildkit:v0.13.2-rootless
                args:
                  - --addr
                  - tcp://127.0.0.1:1234
                  - --oci-worker-no-process-sandbox
                readinessProbe:
                  exec:
                    command:
                      - buildctl
                      - --addr
                      - tcp://127.0.0.1:1234
                      - debug
                      - workers
                  periodSeconds: 10
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  seccompProfile:
                    type: Unconfined
                volumeMounts:
                  - name: buildkit-state
                    mountPath: /home/user/.local/share/buildkit
                  - name: docker-config
                    mountPath: /home/user/.docker/config.json
                    subPath: config.json
                    readOnly: true
                resources:
                  requests:
                    cpu: 200m
                    memory: 512Mi
                  limits:
                    cpu: '2'
                    memory: 4Gi
            volumes:
              - name: work
                emptyDir: {}
              - name: buildkit-state
                emptyDir: {}
              - name: buildctl-bin
                emptyDir: {}
              - name: docker-config
                secret:
                  secretName: registry-docker-config
                  items:
                    - key: .dockerconfigjson
                      path: config.json
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    targetRevision: 0.9.3
