apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-websocket-dev
  namespace: argocd
spec:
  destination:
    name: development
    namespace: pim-websocket
  ignoreDifferences:
  - group: apps
    jsonPointers:
    - /spec/template/spec/nodeSelector
    kind: Deployment
  project: product
  source:
    helm:
      parameters:
      - name: ingress.className
        value: haproxy
      - name: ingress.host
        value: pim-websocket.dev.electgo.com
      - name: ingress.tls.enabled
        value: 'true'
      - name: ingress.tls.secretName
        value: pim-websocket-dev-tls
      - name: nodeSelector.node-role
        value: worker
      - name: nodeSelector.workload
        value: apps
      - name: resources.requests.cpu
        value: 25m
      valueFiles:
      - values.yaml
      - values-dev.yaml
    path: deployments/helm
    repoURL: https://github.com/electgo/pim-websocket.git
    targetRevision: develop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
