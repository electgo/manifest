apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-partners-prod
  namespace: argocd
spec:
  project: product
  source:
    repoURL: https://github.com/electgo/pim-partners-bundling
    targetRevision: main
    path: helm/pim-partners-bundling
    helm:
      releaseName: pim-partners
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    name: production
    namespace: pim-partners-bundling
  syncPolicy:
    # Image tag bumped by CI (bump-image-tag job). selfHeal picks up the
    # values-prod.yaml commit and rolls out automatically.
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
