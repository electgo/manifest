apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-partners-dev
  namespace: argocd
spec:
  project: product
  ignoreDifferences:
    - group: apps
      jsonPointers:
        - /spec/template/spec/nodeSelector
      kind: Deployment
  source:
    repoURL: https://github.com/electgo/pim-partners-bundling
    targetRevision: develop
    path: helm/pim-partners-bundling
    helm:
      releaseName: pim-partners
      valueFiles:
        - values-dev.yaml
      parameters:
        - name: ingress.host
          value: "partners.dev.electgo.com"
        - name: ingress.tls.enabled
          value: "true"
        - name: ingress.tls.secretName
          value: "partners-dev-tls"
        - name: ingress.className
          value: "haproxy"
        - name: resources.requests.cpu
          value: "50m"
        - name: nodeSelector.workload
          value: "apps"
  destination:
    name: development
    namespace: pim-partners-bundling
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  # Secrets (env.secret.* vars) managed via pim-partners-bundling-secret — not in git.
  # Image tag bumped by CI (bump-image-tag job). Sync still manual on dev.
