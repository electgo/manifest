apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-partners-prod
  namespace: argocd
spec:
  project: product
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: pim-partners-bundling-secret
      namespace: pim-partners-bundling
      jsonPointers:
        - /data
        - /stringData
  source:
    repoURL: https://github.com/electgo/pim-partners-bundling
    targetRevision: main
    path: helm/pim-partners-bundling
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters:
        - name: secret.create
          value: "false"
  destination:
    name: production
    namespace: pim-partners-bundling
  syncPolicy:
    # Image tag bumped by CI (bump-image-tag job). selfHeal picks up the
    # values-production.yaml commit and rolls out automatically.
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
