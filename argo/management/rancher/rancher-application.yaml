apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
spec:
  project: management
  source:
    repoURL: https://releases.rancher.com/server-charts/alpha
    chart: rancher
    targetRevision: 2.15.0-alpha9
    helm:
      releaseName: rancher
      values: |
        hostname: rancher.electgo.com
        replicas: 1
        bootstrapPassword: admin
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                - key: workload
                  operator: In
                  values:
                  - helper
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1500m
            memory: 2Gi
        ingress:
          tls:
            source: secret
  destination:
    server: https://kubernetes.default.svc
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
