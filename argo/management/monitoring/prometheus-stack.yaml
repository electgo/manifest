apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: management
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.1.0
    helm:
      releaseName: prometheus
      values: |
        prometheus:
          prometheusSpec:
            nodeSelector:
              workload: observe
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3-encrypted
                  resources:
                    requests:
                      storage: 50Gi
        grafana:
          nodeSelector:
            workload: data
          tolerations:
            - key: dedicated
              value: data
              effect: NoSchedule
          persistence:
            enabled: true
            storageClassName: gp3-encrypted
            size: 10Gi
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
                  access: proxy
                  isDefault: true
                  jsonData:
                    timeInterval: "15s"
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.electgo.com
            tls:
              - secretName: grafana-electgo-com-tls
                hosts:
                  - grafana.electgo.com
          grafana.ini:
            server:
              root_url: https://grafana.electgo.com
              serve_from_sub_path: false
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              workload: observe
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3-encrypted
                  resources:
                    requests:
                      storage: 5Gi
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - alertmanager.electgo.com
            tls:
              - secretName: alertmanager-electgo-com-tls
                hosts:
                  - alertmanager.electgo.com
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
