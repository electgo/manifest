apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: management
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.19.0
    helm:
      releaseName: external-dns
      values: |
        provider:
          name: aws
        env:
          - name: AWS_DEFAULT_REGION
            value: ap-southeast-3
        sources:
          - ingress
        policy: sync
        # noop registry: TXT ownership records can't live at the apex of the
        # per-host zones; safe because these zones are external-dns exclusive
        registry: noop
        domainFilters:
          - electgo.com
        extraArgs:
          # Per-host VPC-private zones only; public electgo.com lives in
          # Cloudflare and must NOT be shadowed by a broad private zone
          - --zone-id-filter=Z08242443RFJYAQXK7TS4 # zot
          - --zone-id-filter=Z0825227BIQVGFH4NKL6 # rancher
          - --zone-id-filter=Z05780641AIFQZ17I1T05 # argocd
          - --zone-id-filter=Z05781301VUSX5NANGEKC # zitadel
          - --zone-id-filter=Z06908971Z7W0I688LA2K # pm
          - --zone-id-filter=Z09467253AERFIQASFIAU # grafana
          - --zone-id-filter=Z069018517JDV7ZIMATSZ # alertmanager
          - --aws-zone-type=private
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
