apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: database-mgmt
  namespace: argocd
spec:
  project: management
  source:
    path: infra/databases/management
    repoURL: https://github.com/electgo/manifest.git
    targetRevision: main
    directory:
      include: '*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: management-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
