apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform tooling (argocd image-updater, ARC, matomo analytics, etc.)
  sourceRepos:
    - https://github.com/electgo/manifest
    - https://github.com/electgo/manifest.git
    - ghcr.io/actions/actions-runner-controller-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - name: development
      namespace: argocd
    - name: production
      namespace: argocd
    - name: production
      namespace: matomo
    - name: development
      namespace: matomo
    - name: production
      namespace: arc-systems
    - name: production
      namespace: arc-runners
    - name: development
      namespace: arc-systems
    - name: development
      namespace: arc-runners
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: false
