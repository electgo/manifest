apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: product
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Product (PIM + AI) workloads across all clusters
  sourceRepos:
    - https://github.com/electgo/manifest
    - https://github.com/electgo/manifest.git
    - https://github.com/electgo/pim-*
    - https://github.com/electgo/product-ai-enrich
  destinations:
    - name: production
      namespace: pim-*
    - name: production
      namespace: product-ai-enrich
    - name: production
      namespace: n8n
    - name: development
      namespace: pim-*
    - name: development
      namespace: product-ai-enrich
    - name: development
      namespace: electgo-seller-center
    - name: development
      namespace: n8n
    # dev-tls-certs Application (project product) places Certificates into
    # every app namespace on dev; these destinations exist for that app.
    - name: development
      namespace: electgo-*
    - name: development
      namespace: crawler-tool
    - name: development
      namespace: etools-chatbot-*
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: storage.k8s.io
      kind: StorageClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: false
