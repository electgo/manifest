apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: electgo-be-user-dev
  namespace: argocd
spec:
  project: marketplace
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: electgo-be-user-secret
      namespace: marketplace
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      name: regcred
      namespace: marketplace
      jsonPointers:
        - /data
  source:
    repoURL: https://github.com/electgo/electgo-be-user
    targetRevision: develop
    path: helm/electgo-be-user
    helm:
      releaseName: electgo-be-user
      valueFiles:
        - values.yaml
        - values-development.yaml
      parameters:
        - name: replicaCount
          value: "0"
        - name: nodeSelector.workload
          value: "chatbot"
        - name: ingress.host
          value: "be-user.dev.electgo.com"
        - name: ingress.tls.enabled
          value: "false"
        - name: ingress.className
          value: "haproxy"
        - name: image.tag
          value: "dev-96e7c707"
        - name: imageCredentials.create
          value: "true"
        - name: imageCredentials.username
          value: "admin"
        - name: imageCredentials.password
          value: "ElectGoregzot134"
        - name: namespace.name
          value: "marketplace"
  destination:
    name: development
    namespace: marketplace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  # Secrets (env.* vars) managed via electgo-be-user-secret — not in git.
