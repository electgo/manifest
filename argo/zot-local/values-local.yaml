replicaCount: 1

image:
  tag: v2.1.16

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  pathtype: Prefix
  hosts:
    - host: zot.electgo.com
      paths:
        - path: /v2
  tls:
    - secretName: zot-tls
      hosts:
        - zot.electgo.com

httpGet:
  scheme: HTTP
  port: 5000

mountConfig: true
mountSecret: true

persistence: true
pvc:
  create: true
  accessModes:
    - ReadWriteOnce
  storage: 20Gi

strategy:
  type: Recreate

configFiles:
  config.json: |-
    {
      "storage": {
        "rootDirectory": "/var/lib/registry"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "auth": {
          "htpasswd": {
            "path": "/secret/htpasswd"
          }
        },
        "accessControl": {
          "repositories": {
            "**": {
              "policies": [
                {
                  "users": [
                    "admin"
                  ],
                  "actions": [
                    "read",
                    "create",
                    "update",
                    "delete"
                  ]
                }
              ],
              "defaultPolicy": []
            }
          },
          "adminPolicy": {
            "users": [
              "admin"
            ],
            "actions": [
              "read",
              "create",
              "update",
              "delete"
            ]
          }
        }
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        }
      }
    }

secretFiles:
  htpasswd: |-
    admin:$2y$05$6eHIPHQDn9fWgtuXX12aA.wd8Tbi/kUwVlINMskkNf/bXT8K4KsRG
