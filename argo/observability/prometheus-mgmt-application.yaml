apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-mgmt
  namespace: argocd
spec:
  project: observability
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.1.0
    helm:
      releaseName: prometheus
      values: |
        prometheus:
          prometheusSpec:
            enableRemoteWriteReceiver: true
            externalLabels:
              cluster: management
            nodeSelector:
              workload: observe
            resources:
              requests:
                memory: 1536Mi
              limits:
                memory: 2560Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3-encrypted
                  resources:
                    requests:
                      storage: 50Gi
        # apiserver/etcd histogram buckets = ~47% of all series (190k/404k) on a 4G node
        kubeApiServer:
          serviceMonitor:
            metricRelabelings:
              - action: drop
                sourceLabels: [__name__]
                regex: (apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_response_sizes_bucket|etcd_request_duration_seconds_bucket)
        # k3s embeds these control-plane components; no separate metrics
        # endpoints exist, so the chart defaults fire permanent *Down alerts.
        kubeProxy:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          serviceMonitor:
            metricRelabelings:
              - action: drop
                sourceLabels: [__name__]
                regex: etcd_request_duration_seconds_bucket
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          defaultDashboardsTimezone: Asia/Jakarta
          smtp:
            existingSecret: grafana-smtp-credentials
            userKey: user
            passwordKey: password
          alerting:
            contactpoints.yaml:
              apiVersion: 1
              contactPoints:
                - orgId: 1
                  name: electgo-production-email
                  receivers:
                    - uid: electgo-production-email
                      type: email
                      settings:
                        addresses: yohannes@limkimhai.com.sg;yusoof.sh@dsg.id;chesa.nur@dsg.id
                        singleEmail: false
            policies.yaml:
              apiVersion: 1
              policies:
                - orgId: 1
                  receiver: electgo-production-email
                  group_by:
                    - grafana_folder
                    - alertname
                  group_wait: 30s
                  group_interval: 5m
                  repeat_interval: 12h
          nodeSelector:
            workload: data
          tolerations:
            - key: dedicated
              value: data
              effect: NoSchedule
          persistence:
            enabled: true
            storageClassName: gp3-encrypted
            size: 10Gi
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
                  access: proxy
                  isDefault: true
                  jsonData:
                    timeInterval: "15s"
                # Prod EKS observability via bridge Services (see manifest
                # k8s/management/monitoring/prod-datasource-bridge.yaml).
                # uids "prometheus"/"loki" match the prod-grafana uids the
                # imported ElectGo dashboards reference.
                - name: Prometheus (prod)
                  type: prometheus
                  uid: prometheus
                  url: http://prometheus-prod.monitoring.svc:9090
                  access: proxy
                  jsonData:
                    timeInterval: "15s"
                - name: Loki
                  type: loki
                  uid: loki
                  url: http://loki-prod.monitoring.svc:3100
                  access: proxy
                  jsonData:
                    maxLines: 5000
                - name: Loki (mgmt)
                  type: loki
                  uid: loki-mgmt
                  url: http://loki.monitoring.svc:3100
                  access: proxy
                # RDS/AWS metrics; auth via mgmt node instance role (inline
                # policy grafana-cloudwatch-metrics-read, metrics-only).
                - name: CloudWatch
                  type: cloudwatch
                  uid: cloudwatch
                  jsonData:
                    authType: default
                    defaultRegion: ap-southeast-3
          sidecar:
            dashboards:
              multicluster:
                global:
                  enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.electgo.com
            tls:
              - secretName: grafana-electgo-com-tls
                hosts:
                  - grafana.electgo.com
          grafana.ini:
            server:
              root_url: https://grafana.electgo.com
              serve_from_sub_path: false
            security:
              cookie_secure: true
              strict_transport_security: true
            analytics:
              reporting_enabled: false
              check_for_updates: false
            users:
              auto_assign_org_role: Viewer
            auth.anonymous:
              enabled: false
            smtp:
              enabled: true
              host: smtp.gmail.com:587
              user: ptdigitalsolusigrup@gmail.com
              from_address: ptdigitalsolusigrup@gmail.com
              from_name: ElectGo Grafana
              startTLS_policy: MandatoryStartTLS
        kubeStateMetrics:
          enabled: false
        additionalPrometheusRulesMap:
          rancher-downstream:
            groups:
              - name: rancher.downstream
                rules:
                  - alert: RancherDownstreamClusterNotReady
                    expr: kube_customresource_rancher_cluster_condition{condition="Ready"} == 0
                    for: 10m
                    labels:
                      severity: critical
                    annotations:
                      summary: 'Rancher downstream cluster {{ $labels.cluster_name }} not Ready'
                      description: 'Cluster {{ $labels.cluster_name }} ({{ $labels.cluster_id }}) Ready=False for 10m. Check cattle-cluster-agent connectivity (DNS rancher.electgo.com, wss /v3/connect).'
                  - alert: RancherDownstreamClusterMetricAbsent
                    expr: absent(kube_customresource_rancher_cluster_condition{condition="Ready"})
                    for: 15m
                    labels:
                      severity: warning
                    annotations:
                      summary: 'Rancher cluster condition metric absent'
                      description: 'kube-state-metrics customResourceState for management.cattle.io clusters not reporting. Alerting on downstream disconnect is blind.'
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              workload: observe
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3-encrypted
                  resources:
                    requests:
                      storage: 5Gi
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - alertmanager.electgo.com
            tls:
              - secretName: alertmanager-electgo-com-tls
                hosts:
                  - alertmanager.electgo.com
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
