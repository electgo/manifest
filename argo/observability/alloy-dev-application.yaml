apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-dev
  namespace: argocd
spec:
  destination:
    name: development
    namespace: monitoring
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.9.0
      helm:
        releaseName: alloy
        values: |
          controller:
            type: daemonset
            tolerations:
              - operator: Exists
            volumes:
              extra:
                - name: rootfs
                  hostPath:
                    path: /
                - name: procfs
                  hostPath:
                    path: /proc
                - name: sysfs
                  hostPath:
                    path: /sys
          alloy:
            clustering:
              enabled: true
            extraEnv:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            mounts:
              extra:
                - name: rootfs
                  mountPath: /host/root
                  readOnly: true
                - name: procfs
                  mountPath: /host/proc
                  readOnly: true
                - name: sysfs
                  mountPath: /host/sys
                  readOnly: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            configMap:
              content: |
                logging {
                  level = "warn"
                }

                // ---------- metrics: kubelet + cadvisor ----------
                discovery.kubernetes "nodes" {
                  role = "node"
                }

                // k3s single-binary: the kubelet endpoint also exposes
                // apiserver/etcd histograms. Drop the same heavy buckets the
                // mgmt kps relabeling drops (~47% of series otherwise).
                prometheus.relabel "drop_heavy" {
                  rule {
                    source_labels = ["__name__"]
                    regex         = "(apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_response_sizes_bucket|etcd_request_duration_seconds_bucket)"
                    action        = "drop"
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                prometheus.scrape "kubelet" {
                  targets           = discovery.kubernetes.nodes.targets
                  scheme            = "https"
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    insecure_skip_verify = true
                  }
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.relabel.drop_heavy.receiver]
                }

                prometheus.scrape "cadvisor" {
                  targets           = discovery.kubernetes.nodes.targets
                  scheme            = "https"
                  metrics_path      = "/metrics/cadvisor"
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    insecure_skip_verify = true
                  }
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                // ---------- metrics: kube-state-metrics ----------
                prometheus.scrape "ksm" {
                  targets = [{ "__address__" = "ksm-kube-state-metrics.monitoring.svc:8080" }]
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                // ---------- metrics: node (embedded node-exporter) ----------
                prometheus.exporter.unix "node" {
                  procfs_path = "/host/proc"
                  sysfs_path  = "/host/sys"
                  rootfs_path = "/host/root"
                }

                discovery.relabel "node" {
                  targets = prometheus.exporter.unix.node.targets
                  rule {
                    target_label = "instance"
                    replacement  = sys.env("NODE_NAME")
                  }
                }

                prometheus.scrape "node" {
                  targets    = discovery.relabel.node.output
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                // ---------- metrics: annotated services (DB exporters) ----------
                discovery.kubernetes "svc" {
                  role = "service"
                }

                discovery.relabel "annotated_svc" {
                  targets = discovery.kubernetes.svc.targets
                  rule {
                    source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_scrape"]
                    regex         = "true"
                    action        = "keep"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_port"]
                    regex         = ".+"
                    action        = "keep"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_port"]
                    target_label  = "__tmp_port"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_service_cluster_ip", "__tmp_port"]
                    separator     = ":"
                    target_label  = "__address__"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace"]
                    target_label  = "namespace"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_service_name"]
                    target_label  = "job"
                  }
                }

                prometheus.scrape "annotated_svc" {
                  targets = discovery.relabel.annotated_svc.output
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                prometheus.remote_write "mgmt" {
                  endpoint {
                    url = "http://prometheus-mgmt-rw.monitoring.svc:9090/api/v1/write"
                  }
                  external_labels = {
                    cluster = "development",
                  }
                }

                // ---------- logs ----------
                discovery.kubernetes "pods" {
                  role = "pod"
                }

                discovery.relabel "pod_logs" {
                  targets = discovery.kubernetes.pods.targets
                  rule {
                    source_labels = ["__meta_kubernetes_pod_phase"]
                    regex         = "Succeeded|Failed"
                    action        = "drop"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace"]
                    target_label  = "namespace"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_name"]
                    target_label  = "pod"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_container_name"]
                    target_label  = "container"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                    target_label  = "app"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
                    target_label  = "component"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                    separator     = "/"
                    target_label  = "job"
                  }
                }

                loki.source.kubernetes "pods" {
                  targets = discovery.relabel.pod_logs.output
                  clustering {
                    enabled = true
                  }
                  forward_to = [loki.process.alerts.receiver]
                }

                // Turn error log lines into Prometheus counters so the
                // existing email Alertmanager (via mgmt Prometheus rules)
                // can alert on app errors and DB permission/connection
                // errors. Logs still pass through to Loki unchanged.
                loki.process "alerts" {
                  forward_to = [loki.write.mgmt.receiver]

                  stage.match {
                    selector = "{namespace=~\".+\"} |~ \"(?i)(error|fatal|panic|exception|traceback)\" != \"manifest cache hit\""
                    stage.metrics {
                      metric.counter {
                        name        = "log_app_errors_total"
                        description = "count of error/fatal/panic log lines"
                        action      = "inc"
                        match_all   = true
                      }
                    }
                  }

                  stage.match {
                    selector = "{namespace=~\".+\"} |~ \"(?i)(permission denied|access denied|authentication failed|auth failed|not authorized|password authentication failed|denied for user|access denied for user|role .* does not exist|ER_ACCESS_DENIED)\" != \"manifest cache hit\""
                    stage.metrics {
                      metric.counter {
                        name        = "log_db_permission_errors_total"
                        description = "count of permission/auth denied log lines"
                        action      = "inc"
                        match_all   = true
                      }
                    }
                  }

                  stage.match {
                    selector = "{namespace=~\".+\"} |~ \"(?i)(connection refused|could not connect|connection reset|too many connections|econnrefused|server closed the connection|connection timed out)\" != \"manifest cache hit\""
                    stage.metrics {
                      metric.counter {
                        name        = "log_db_connection_errors_total"
                        description = "count of connection failure log lines"
                        action      = "inc"
                        match_all   = true
                      }
                    }
                  }
                }

                loki.write "mgmt" {
                  endpoint {
                    url = "http://loki-mgmt.monitoring.svc:3100/loki/api/v1/push"
                  }
                  external_labels = {
                    cluster = "development",
                  }
                }

                // Scrape Alloy's own endpoint, keep only the log-derived
                // counters, and remote-write them so Prometheus rules fire.
                prometheus.scrape "self_logmetrics" {
                  targets    = [{"__address__" = "127.0.0.1:12345", job = "alloy-log-metrics"}]
                  forward_to = [prometheus.relabel.keep_logmetrics.receiver]
                }

                prometheus.relabel "keep_logmetrics" {
                  rule {
                    source_labels = ["__name__"]
                    regex         = "loki_process_custom_log_(app|db_permission|db_connection)_errors_total"
                    action        = "keep"
                  }
                  rule {
                    regex  = "pod|instance|container|component_id|component_path|job"
                    action = "labeldrop"
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-state-metrics
      targetRevision: 7.4.0
      helm:
        releaseName: ksm
        values: |
          metricLabelsAllowlist:
            - pods=[*]
            - deployments=[*]
            - persistentvolumeclaims=[*]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
