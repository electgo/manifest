apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-dev
  namespace: argocd
spec:
  destination:
    name: development
    namespace: monitoring
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.9.0
      helm:
        releaseName: alloy
        values: |
          controller:
            type: daemonset
            tolerations:
              - operator: Exists
            volumes:
              extra:
                - name: rootfs
                  hostPath:
                    path: /
                - name: procfs
                  hostPath:
                    path: /proc
                - name: sysfs
                  hostPath:
                    path: /sys
          alloy:
            clustering:
              enabled: true
            extraEnv:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            mounts:
              extra:
                - name: rootfs
                  mountPath: /host/root
                  readOnly: true
                - name: procfs
                  mountPath: /host/proc
                  readOnly: true
                - name: sysfs
                  mountPath: /host/sys
                  readOnly: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            configMap:
              content: |
                logging {
                  level = "warn"
                }

                // ---------- metrics: kubelet + cadvisor ----------
                discovery.kubernetes "nodes" {
                  role = "node"
                }

                // k3s single-binary: the kubelet endpoint also exposes
                // apiserver/etcd histograms. Drop the same heavy buckets the
                // mgmt kps relabeling drops (~47% of series otherwise).
                prometheus.relabel "drop_heavy" {
                  rule {
                    source_labels = ["__name__"]
                    regex         = "(apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_response_sizes_bucket|etcd_request_duration_seconds_bucket)"
                    action        = "drop"
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                prometheus.scrape "kubelet" {
                  targets           = discovery.kubernetes.nodes.targets
                  scheme            = "https"
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    insecure_skip_verify = true
                  }
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.relabel.drop_heavy.receiver]
                }

                prometheus.scrape "cadvisor" {
                  targets           = discovery.kubernetes.nodes.targets
                  scheme            = "https"
                  metrics_path      = "/metrics/cadvisor"
                  bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                  tls_config {
                    insecure_skip_verify = true
                  }
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                // ---------- metrics: kube-state-metrics ----------
                prometheus.scrape "ksm" {
                  targets = [{ "__address__" = "ksm-kube-state-metrics.monitoring.svc:8080" }]
                  clustering {
                    enabled = true
                  }
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                // ---------- metrics: node (embedded node-exporter) ----------
                prometheus.exporter.unix "node" {
                  procfs_path = "/host/proc"
                  sysfs_path  = "/host/sys"
                  rootfs_path = "/host/root"
                }

                discovery.relabel "node" {
                  targets = prometheus.exporter.unix.node.targets
                  rule {
                    target_label = "instance"
                    replacement  = sys.env("NODE_NAME")
                  }
                }

                prometheus.scrape "node" {
                  targets    = discovery.relabel.node.output
                  forward_to = [prometheus.remote_write.mgmt.receiver]
                }

                prometheus.remote_write "mgmt" {
                  endpoint {
                    url = "http://prometheus-mgmt-rw.monitoring.svc:9090/api/v1/write"
                  }
                  external_labels = {
                    cluster = "development",
                  }
                }

                // ---------- logs ----------
                discovery.kubernetes "pods" {
                  role = "pod"
                }

                discovery.relabel "pod_logs" {
                  targets = discovery.kubernetes.pods.targets
                  rule {
                    source_labels = ["__meta_kubernetes_pod_phase"]
                    regex         = "Succeeded|Failed"
                    action        = "drop"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace"]
                    target_label  = "namespace"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_name"]
                    target_label  = "pod"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_container_name"]
                    target_label  = "container"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                    target_label  = "app"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
                    target_label  = "component"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                    separator     = "/"
                    target_label  = "job"
                  }
                }

                loki.source.kubernetes "pods" {
                  targets = discovery.relabel.pod_logs.output
                  clustering {
                    enabled = true
                  }
                  forward_to = [loki.write.mgmt.receiver]
                }

                loki.write "mgmt" {
                  endpoint {
                    url = "http://loki-mgmt.monitoring.svc:3100/loki/api/v1/push"
                  }
                  external_labels = {
                    cluster = "development",
                  }
                }
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-state-metrics
      targetRevision: 7.4.0
      helm:
        releaseName: ksm
        values: |
          metricLabelsAllowlist:
            - pods=[*]
            - deployments=[*]
            - persistentvolumeclaims=[*]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
