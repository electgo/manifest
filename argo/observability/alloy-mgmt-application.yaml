apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-mgmt
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.9.0
      helm:
        releaseName: alloy
        values: |
          controller:
            type: daemonset
            tolerations:
              - operator: Exists
          alloy:
            clustering:
              enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
            configMap:
              content: |
                logging {
                  level = "warn"
                }

                discovery.kubernetes "pods" {
                  role = "pod"
                }

                discovery.relabel "pod_logs" {
                  targets = discovery.kubernetes.pods.targets
                  rule {
                    source_labels = ["__meta_kubernetes_pod_phase"]
                    regex         = "Succeeded|Failed"
                    action        = "drop"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace"]
                    target_label  = "namespace"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_name"]
                    target_label  = "pod"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_container_name"]
                    target_label  = "container"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                    target_label  = "app"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
                    target_label  = "component"
                  }
                  rule {
                    source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                    separator     = "/"
                    target_label  = "job"
                  }
                }

                loki.source.kubernetes "pods" {
                  targets = discovery.relabel.pod_logs.output
                  clustering {
                    enabled = true
                  }
                  forward_to = [loki.process.alerts.receiver]
                }

                // Error log lines -> Prometheus counters for the email
                // Alertmanager (app/db error alerts). Logs pass through.
                loki.process "alerts" {
                  forward_to = [loki.write.local.receiver]
                  stage.match {
                    selector = "{namespace=~\".+\"} |~ \"(?i)(error|fatal|panic|exception|traceback)\" != \"manifest cache hit\""
                    stage.metrics {
                      metric.counter {
                        name        = "log_app_errors_total"
                        description = "count of error/fatal/panic log lines"
                        action      = "inc"
                        match_all   = true
                      }
                    }
                  }
                  stage.match {
                    selector = "{namespace=~\".+\"} |~ \"(?i)(permission denied|access denied|authentication failed|auth failed|not authorized|password authentication failed|denied for user|access denied for user|role .* does not exist|ER_ACCESS_DENIED)\" != \"manifest cache hit\""
                    stage.metrics {
                      metric.counter {
                        name        = "log_db_permission_errors_total"
                        description = "count of permission/auth denied log lines"
                        action      = "inc"
                        match_all   = true
                      }
                    }
                  }
                  stage.match {
                    selector = "{namespace=~\".+\"} |~ \"(?i)(connection refused|could not connect|connection reset|too many connections|econnrefused|server closed the connection|connection timed out)\" != \"manifest cache hit\""
                    stage.metrics {
                      metric.counter {
                        name        = "log_db_connection_errors_total"
                        description = "count of connection failure log lines"
                        action      = "inc"
                        match_all   = true
                      }
                    }
                  }
                }

                loki.write "local" {
                  endpoint {
                    url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
                  }
                  external_labels = {
                    cluster = "management",
                  }
                }

                prometheus.scrape "self_logmetrics" {
                  targets    = [{"__address__" = "127.0.0.1:12345", job = "alloy-log-metrics"}]
                  forward_to = [prometheus.relabel.keep_logmetrics.receiver]
                }

                prometheus.relabel "keep_logmetrics" {
                  rule {
                    source_labels = ["__name__"]
                    regex         = "loki_process_custom_log_(app|db_permission|db_connection)_errors_total"
                    action        = "keep"
                  }
                  rule {
                    regex  = "pod|instance|container|component_id|component_path|job"
                    action = "labeldrop"
                  }
                  forward_to = [prometheus.remote_write.logmetrics.receiver]
                }

                prometheus.remote_write "logmetrics" {
                  endpoint {
                    url = "http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write"
                  }
                  external_labels = {
                    cluster = "management",
                  }
                }
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-state-metrics
      targetRevision: 7.4.0
      helm:
        releaseName: ksm
        values: |
          prometheus:
            monitor:
              enabled: true
              additionalLabels:
                release: prometheus
          rbac:
            extraRules:
              - apiGroups: ["management.cattle.io"]
                resources: ["clusters"]
                verbs: ["list", "watch"]
          customResourceState:
            enabled: true
            config:
              kind: CustomResourceStateMetrics
              spec:
                resources:
                  - groupVersionKind:
                      group: management.cattle.io
                      version: v3
                      kind: Cluster
                    labelsFromPath:
                      cluster_id: [metadata, name]
                      cluster_name: [spec, displayName]
                    metrics:
                      - name: rancher_cluster_condition
                        help: Rancher cluster status conditions (1=True, 0=False)
                        each:
                          type: Gauge
                          gauge:
                            path: [status, conditions]
                            labelsFromPath:
                              condition: [type]
                            valueFrom: [status]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
