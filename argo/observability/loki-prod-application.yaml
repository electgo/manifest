apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  destination:
    name: production
    namespace: monitoring
  project: observability
  source:
    chart: loki
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: s3
            bucketNames:
              chunks: electgo-prod-storage
              ruler: electgo-prod-storage
              admin: electgo-prod-storage
            s3:
              region: ap-southeast-3
              s3ForcePathStyle: false
              insecure: false
          pattern_ingester:
            enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 168h  # 7d
            max_query_parallelism: 32
            split_queries_by_interval: 30m
            ingestion_rate_mb: 16
            ingestion_burst_size_mb: 32
          compactor:
            retention_enabled: true
            delete_request_store: s3
          ruler:
            enable_api: true
            storage:
              type: s3
              s3:
                bucketnames: electgo-prod-storage
                region: ap-southeast-3
              alertmanager_url: ""

        # Single-binary: 1 stateful pod handling all reads/writes
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: gp3-encrypted
            size: 50Gi
          resources:
            requests:
              cpu: 200m
              memory: 4Gi
            limits:
              memory: 4Gi
          extraArgs:
            - "-config.expand-env=true"

        # Scaled microservices off (single-binary mode)
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0

        gateway:
          enabled: true
          replicas: 1
          basicAuth:
            enabled: false
          # Gateway is nginx and does not expose /metrics; exclude it from the
          # loki ServiceMonitor (selector skips services labeled
          # prometheus.io/service-monitor=false).
          service:
            labels:
              prometheus.io/service-monitor: "false"
          extraVolumeMounts: []
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi

        # lokiCanary is a separate top-level subchart in 6.x; the path under
        # `monitoring.lokiCanary` only toggles serviceMonitor/dashboards.
        lokiCanary:
          enabled: false

        chunksCache:
          enabled: false  # save memory; enable later if query latency hurts
        resultsCache:
          enabled: false

        monitoring:
          dashboards:
            enabled: false
          rules:
            enabled: false
          serviceMonitor:
            enabled: true
            labels:
              release: kps
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          lokiCanary:
            enabled: false

        test:
          enabled: false

        serviceAccount:
          create: true
          name: loki
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::043713809039:role/electgo-prod-loki-s3
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.21.0
