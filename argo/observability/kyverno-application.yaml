apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: observability
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.3.9
    helm:
      releaseName: kyverno
      values: |
        admissionController:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        backgroundController:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
        reportsController:
          enabled: false
        cleanupController:
          enabled: false
        webhooksCleanup:
          enabled: true
          image:
            repository: bitnamilegacy/kubectl
            tag: '1.30.2'
        policyReportsCleanup:
          image:
            repository: bitnamilegacy/kubectl
            tag: '1.30.2'
        features:
          policyExceptions:
            enabled: true
          generateValidatingAdmissionPolicy:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
