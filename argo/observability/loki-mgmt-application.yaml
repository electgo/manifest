apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-mgmt
  namespace: argocd
spec:
  project: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.3
    helm:
      releaseName: loki
      values: |
        grafana:
          sidecar:
            datasources:
              defaultDatasourceEnabled: false
        loki:
          persistence:
            enabled: true
            storageClassName: gp3-encrypted
            size: 50Gi
          nodeSelector:
            workload: observe
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
        promtail:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
