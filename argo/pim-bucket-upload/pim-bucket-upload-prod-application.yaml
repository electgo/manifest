apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-bucket-upload-prod
  namespace: argocd
spec:
  project: product
  source:
    repoURL: https://github.com/electgo/pim-bucket-upload.git
    targetRevision: main
    path: helm/pim-bucket-upload
    helm:
      releaseName: pim-bucket-upload
      valueFiles:
        - values-prod.yaml
  destination:
    name: production
    namespace: pim-bucket-upload
  syncPolicy:
    # Standby mode: production app is registered but will not auto-sync
    # until team explicitly runs Sync (or enables automated sync).
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
