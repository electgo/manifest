apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-bucket-upload-dev
  namespace: argocd
spec:
  project: product
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/nodeSelector
  source:
    repoURL: https://github.com/electgo/pim-bucket-upload.git
    targetRevision: develop
    path: helm/pim-bucket-upload
    helm:
      valueFiles:
        - values-development.yaml
      parameters:
        - name: persistence.writable.storageClass
          value: "nfs-client-agent-1"
        - name: namespace.name
          value: "pim-bucket-upload"
        - name: imageCredentials.create
          value: "false"
        - name: secret.create
          value: "false"
        - name: migration.enabled
          value: "false"
        - name: nodeSelector.node-role
          value: "worker"
        - name: nodeSelector.workload
          value: "apps"
        - name: ingress.className
          value: "haproxy"
        - name: ingress.tls.enabled
          value: "true"
        - name: ingress.tls.secretName
          value: "bucketupload-dev-tls"
  destination:
    name: development
    namespace: pim-bucket-upload
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
