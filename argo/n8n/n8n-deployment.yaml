apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: n8n
      app.kubernetes.io/name: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: n8n
        app.kubernetes.io/name: n8n
    spec:
      nodeSelector:
        workload: apps
      initContainers:
        - name: wait-postgres
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "${DB_POSTGRESDB_HOST}" -p "${DB_POSTGRESDB_PORT}" -U "${DB_POSTGRESDB_USER}" -d "${DB_POSTGRESDB_DATABASE}"; do
                echo "waiting for postgres ${DB_POSTGRESDB_HOST}:${DB_POSTGRESDB_PORT}..."
                sleep 3
              done
              echo "postgres ready"
          env:
            - name: DB_POSTGRESDB_HOST
              valueFrom:
                secretKeyRef:
                  key: host
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_PORT
              valueFrom:
                secretKeyRef:
                  key: port
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_DATABASE
              valueFrom:
                secretKeyRef:
                  key: database
                  name: n8n-pg-external
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.22.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5678
              name: http
              protocol: TCP
          env:
            - name: N8N_HOST
              value: "auto8.dev.electgo.com"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_EDITOR_BASE_URL
              value: "https://auto8.dev.electgo.com"
            - name: WEBHOOK_URL
              value: "https://auto8.dev.electgo.com/"
            - name: N8N_SECURE_COOKIE
              value: "true"
            - name: GENERIC_TIMEZONE
              value: "Asia/Jakarta"
            - name: TZ
              value: "Asia/Jakarta"
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              valueFrom:
                secretKeyRef:
                  key: host
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_PORT
              valueFrom:
                secretKeyRef:
                  key: port
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_DATABASE
              valueFrom:
                secretKeyRef:
                  key: database
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  key: user
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: n8n-pg-external
            - name: DB_POSTGRESDB_SSL_ENABLED
              value: "false"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  key: encryption-key
                  name: n8n-secrets
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "false"
            - name: NODE_ENV
              value: "production"
            - name: N8N_LOG_LEVEL
              value: "info"
            - name: N8N_DEFAULT_BINARY_DATA_MODE
              value: "filesystem"
            - name: N8N_METRICS
              value: "true"
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: "168"
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data-local
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
spec:
  ports:
    - port: 5678
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/name: n8n
  type: ClusterIP
