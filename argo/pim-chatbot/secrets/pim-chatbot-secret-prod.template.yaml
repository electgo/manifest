apiVersion: v1
kind: Secret
metadata:
  name: pim-chatbot-env
  namespace: pim-chatbot
  labels:
    app.kubernetes.io/name: pim-chatbot
    app.kubernetes.io/instance: pim-chatbot-prod
    app.kubernetes.io/managed-by: argocd-manual
type: Opaque
stringData:
  .env: |
    CI_ENVIRONMENT = "production"
    app.baseURL = "https://chat.electgo.com"

    bot.runner =
    bot.runner.apikey =
    chatbot.sender =

    gpt.apikey = CHANGE_ME_PROD_GPT_APIKEY
    gpt.apikey2 =
    gpt.customapikey =
    gpt.vectorstore.qna =
    gpt.vectorstore.product =

    n8n.trainer.main =

    deploy.secretkey = CHANGE_ME_PROD_DEPLOY_SECRETKEY

    bucketupload.accesskey = CHANGE_ME_PROD_BUCKETUPLOAD_ACCESSKEY
    bucketupload.endpoint = bucketupload.electgo.com

    elastic.egchatbot.default = http://elasticsearch-main-es-http.database.svc.cluster.local:9200/egchatbot_sg
    elastic.egchatbot.indo = http://elasticsearch-main-es-http.database.svc.cluster.local:9200/egchatbot_id
    elastic.egchatbot.staging = http://elasticsearch-main-es-http.database.svc.cluster.local:9200/egchatbot_staging_sg
    elastic.egchatbot.staging_id = http://elasticsearch-main-es-http.database.svc.cluster.local:9200/egchatbot_staging_id
    elastic.egchatbot.user = egchatbot
    elastic.egchatbot.password = CHANGE_ME_PROD_EGCHATBOT_PASSWORD

    database.default.hostname = mysql-main-primary-shim.database.svc.cluster.local
    database.default.database = pim_chatbot
    database.default.username = dbmasteruser
    database.default.password = CHANGE_ME_PROD_DB_PASSWORD
    database.default.DBDriver = MySQLi
    database.default.DBPrefix =
    database.default.port = 3306
    database.default.ssl = "true"
    database.default.allowPublicKeyRetrieval = "true"

    database.pim_master.hostname = mysql-main-primary-shim.database.svc.cluster.local
    database.pim_master.database = pim_master
    database.pim_master.username = dbmasteruser
    database.pim_master.password = CHANGE_ME_PROD_DB_PASSWORD
    database.pim_master.DBDriver = MySQLi
    database.pim_master.DBPrefix =
    database.pim_master.port = 3306
    database.pim_master.ssl = "true"
    database.pim_master.allowPublicKeyRetrieval = "true"

    database.pim_indo.hostname = mysql-main-primary-shim.database.svc.cluster.local
    database.pim_indo.database = pim_indo
    database.pim_indo.username = dbmasteruser
    database.pim_indo.password = CHANGE_ME_PROD_DB_PASSWORD
    database.pim_indo.DBDriver = MySQLi
    database.pim_indo.DBPrefix =
    database.pim_indo.port = 3306
    database.pim_indo.ssl = "true"
    database.pim_indo.allowPublicKeyRetrieval = "true"

    database.pim_staging.hostname = mysql-main-primary-shim.database.svc.cluster.local
    database.pim_staging.database = pim_staging
    database.pim_staging.username = dbmasteruser
    database.pim_staging.password = CHANGE_ME_PROD_DB_PASSWORD
    database.pim_staging.DBDriver = MySQLi
    database.pim_staging.DBPrefix =
    database.pim_staging.port = 3306
    database.pim_staging.ssl = "true"
    database.pim_staging.allowPublicKeyRetrieval = "true"

    database.pim_staging_id.hostname = mysql-main-primary-shim.database.svc.cluster.local
    database.pim_staging_id.database = pim_staging_id
    database.pim_staging_id.username = dbmasteruser
    database.pim_staging_id.password = CHANGE_ME_PROD_DB_PASSWORD
    database.pim_staging_id.DBDriver = MySQLi
    database.pim_staging_id.DBPrefix =
    database.pim_staging_id.port = 3306
    database.pim_staging_id.ssl = "true"
    database.pim_staging_id.allowPublicKeyRetrieval = "true"
