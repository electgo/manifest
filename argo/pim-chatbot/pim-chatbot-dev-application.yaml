apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pim-chatbot-dev
  namespace: argocd
spec:
  project: product
  source:
    repoURL: https://github.com/electgo/pim-chatbot
    targetRevision: develop
    path: deployments/helm
    helm:
      releaseName: pim-chatbot
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: resources.requests.cpu
          value: "25m"
        - name: resources.requests.memory
          value: "128Mi"
        - name: ingress.host
          value: "chat.dev.electgo.com"
        - name: ingress.tls.enabled
          value: "true"
        - name: ingress.tls.secretName
          value: "chat-dev-tls"
        - name: ingress.className
          value: "haproxy"
        - name: nodeSelector.workload
          value: "apps"
  destination:
    name: development
    namespace: pim-chatbot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  # Secrets (env.* vars) managed via pim-chatbot-env Secret — not in git.
  # Image tag bumped by CI (bump-image-tag job). Manual sync on dev.
