apiVersion: v1
kind: ServiceAccount
metadata:
  name: matomo-archiver
  namespace: matomo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: matomo-archiver
  namespace: matomo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: matomo-archiver
  namespace: matomo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: matomo-archiver
subjects:
  - kind: ServiceAccount
    name: matomo-archiver
    namespace: matomo
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: matomo-archive
  namespace: matomo
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3300
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: matomo-archiver
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: alpine/k8s:1.35.4
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  POD=$(kubectl -n matomo get pod -l app=matomo --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
                  echo "Archiving via pod: $POD"
                  kubectl -n matomo exec "$POD" -- su -s /bin/sh -c 'php /var/www/html/console core:archive --url=https://track.electgo.com' www-data
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { cpu: 200m, memory: 128Mi }
