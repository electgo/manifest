apiVersion: v1
kind: Namespace
metadata:
  name: zot
---
apiVersion: v1
kind: Secret
metadata:
  name: zot-htpasswd
  namespace: zot
type: Opaque
stringData:
  htpasswd: |
    admin:$2y$05$6eHIPHQDn9fWgtuXX12aA.wd8Tbi/kUwVlINMskkNf/bXT8K4KsRG
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: zot
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "gc": true,
        "dedupe": true,
        "commit": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "auth": {
          "htpasswd": {
            "path": "/auth/htpasswd"
          }
        },
        "accessControl": {
          "repositories": {
            "**": {
              "policies": [
                {
                  "users": ["admin"],
                  "actions": ["read", "create", "update", "delete"]
                }
              ],
              "defaultPolicy": ["read", "create", "update", "delete"]
            }
          },
          "adminPolicy": {
            "users": ["admin"],
            "actions": ["read", "create", "update", "delete"]
          }
        }
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "ui": {
          "enable": true
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: zot
  namespace: zot
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  selector:
    app: zot
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zot
  namespace: zot
spec:
  serviceName: zot
  replicas: 1
  selector:
    matchLabels:
      app: zot
  template:
    metadata:
      labels:
        app: zot
    spec:
      nodeSelector:
        workload: admin
      securityContext:
        fsGroup: 1000
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot:v2.1.17
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - name: http
              containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/zot
            - name: config
              mountPath: /etc/zot
            - name: htpasswd
              mountPath: /auth/htpasswd
              subPath: htpasswd
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-config
        - name: htpasswd
          secret:
            secretName: zot-htpasswd
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3-encrypted
        resources:
          requests:
            storage: 20Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zot
  namespace: zot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: traefik
  rules:
  - host: zot.electgo.com
    http:
      paths:
      - backend:
          service:
            name: zot
            port:
              number: 5000
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - zot.electgo.com
    secretName: zot-tls
