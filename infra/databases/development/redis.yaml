apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: database
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-vpn
  namespace: database
spec:
  type: LoadBalancer
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      nodePort: 31379
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: v1
kind: Secret
metadata:
  name: database-sharedops-credentials
  namespace: database
stringData:
  username: sharedops
  password: __REDACTED_SHAREDOPS_PASSWORD__
  index: "4"
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: database-redis-default-credentials
  namespace: database
stringData:
  username: default
  password: __REDACTED_SHAREDOPS_PASSWORD__
type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      nodeSelector:
        workload: shares
      containers:
        - name: redis
          image: redis:8
          command:
            - sh
            - -c
            - |
              printf 'user default on >%s ~* &* +@all\nuser developer on >%s ~* &* +@all\nuser sharedops on >%s ~* &* +@all\n' "$DEFAULT_PASSWORD" "$DEVELOPER_PASSWORD" "$SHAREDOPS_PASSWORD" > /data/users.acl
              exec redis-server --aclfile /data/users.acl --maxmemory 200mb --maxmemory-policy allkeys-lru
          env:
            - name: DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-redis-default-credentials
                  key: password
            - name: DEVELOPER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-developer-credentials
                  key: password
            - name: SHAREDOPS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-sharedops-credentials
                  key: password
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$DEFAULT_PASSWORD\" --no-auth-warning ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$DEFAULT_PASSWORD\" --no-auth-warning ping"]
            initialDelaySeconds: 30
            periodSeconds: 20
