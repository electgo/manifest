apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: database
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      nodeSelector:
        workload: shares
      containers:
        - name: redis
          image: redis:8
          command:
            - sh
            - -c
            - |
              printf 'user default on nopass ~* &* +@all\nuser developer on >%s ~* &* +@all\n' "$DEVELOPER_PASSWORD" > /data/users.acl
              exec redis-server --aclfile /data/users.acl --maxmemory 200mb --maxmemory-policy allkeys-lru
          env:
            - name: DEVELOPER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-developer-credentials
                  key: password
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping"]
            initialDelaySeconds: 30
            periodSeconds: 20
