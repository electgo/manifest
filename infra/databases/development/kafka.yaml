apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: database
spec:
  type: ClusterIP
  ports:
    - name: plaintext
      port: 9092
      targetPort: plaintext
    - name: controller
      port: 9093
      targetPort: controller
    - name: sasl
      port: 9094
      targetPort: sasl
  selector:
    app.kubernetes.io/name: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-vpn
  namespace: database
spec:
  type: NodePort
  ports:
    - name: saslext
      port: 9095
      targetPort: saslext
      nodePort: 31094
  selector:
    app.kubernetes.io/name: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: database
spec:
  serviceName: kafka
  replicas: 1
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
    spec:
      securityContext:
        fsGroup: 1000
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: fix-data-dir
          image: busybox
          imagePullPolicy: IfNotPresent
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          command: ["sh", "-c", "rm -rf /var/lib/kafka/data/lost+found"]
          resources: {}
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      containers:
        - name: kafka
          image: apache/kafka:4.3.0
          imagePullPolicy: IfNotPresent
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          ports:
            - name: plaintext
              containerPort: 9092
              protocol: TCP
            - name: controller
              containerPort: 9093
              protocol: TCP
            - name: sasl
              containerPort: 9094
              protocol: TCP
            - name: saslext
              containerPort: 9095
              protocol: TCP
          env:
            - name: CLUSTER_ID
              value: electgo-kafka-dev1
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,SASL://:9094,SASLEXT://:9095,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka.database.svc.cluster.local:9092,SASL://kafka.database.svc.cluster.local:9094,SASLEXT://kafka.dev.electgo.com:31094
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SASL:SASL_PLAINTEXT,SASLEXT:SASL_PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka-0.kafka.database.svc.cluster.local:9093
            - name: KAFKA_LISTENER_NAME_SASL_SASL_ENABLED_MECHANISMS
              value: SCRAM-SHA-256
            - name: KAFKA_LISTENER_NAME_SASL_SCRAM___SHA___256_SASL_JAAS_CONFIG
              value: org.apache.kafka.common.security.scram.ScramLoginModule required;
            - name: KAFKA_LISTENER_NAME_SASLEXT_SASL_ENABLED_MECHANISMS
              value: SCRAM-SHA-256
            - name: KAFKA_LISTENER_NAME_SASLEXT_SCRAM___SHA___256_SASL_JAAS_CONFIG
              value: org.apache.kafka.common.security.scram.ScramLoginModule required;
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "1"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_LOG_SEGMENT_BYTES
              value: "1073741824"
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: plaintext
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            tcpSocket:
              port: plaintext
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3-encrypted
        volumeMode: Filesystem
        resources:
          requests:
            storage: 5Gi
