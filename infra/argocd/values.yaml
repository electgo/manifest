global:
  domain: argocd.electgo.com
  affinity:
    podAntiAffinity: soft
    nodeAffinity:
      type: none

configs:
  cm:
    url: https://argocd.electgo.com
    timeout.reconciliation: 180s
    timeout.reconciliation.jitter: 90s
  params:
    server.insecure: "true"
    server.repo.server.strict.tls: "false"
    server.repo.server.timeout.seconds: "180"
    reposerver.git.request.timeout: 90s
    reposerver.git.lsremote.parallelism.limit: "8"
    reposerver.parallelism.limit: "10"
    reposerver.repo.cache.expiration: 24h

server:
  replicas: 2
  initContainers:
    - name: install-electgo-argocd-server
      image: amazon/aws-cli:2.17.56
      imagePullPolicy: IfNotPresent
      envFrom:
        - secretRef:
            name: argocd-aws-creds
      command:
        - sh
        - -ec
      args:
        - |
          case "$(uname -m)" in
            x86_64)
              server_bin="argocd-server-v3.4.3-electgo.1-linux-amd64"
              server_sha="a7f861a40ae3cef846787fd9e3142467f859b960a06105fe733543e097c391a1"
              ;;
            aarch64|arm64)
              server_bin="argocd-server-v3.4.3-electgo.1-linux-arm64"
              server_sha="30774173c99ae1e6de1c7a208fc016a4aca487336bbdf94c5efd9665ecb5f1d3"
              ;;
            *)
              echo "unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          aws s3 cp --no-progress "s3://electgo-prod-storage/electgo/management/argocd/${server_bin}" /custom-bin/argocd-server
          echo "${server_sha}  /custom-bin/argocd-server" | sha256sum -c -
          chmod 0755 /custom-bin/argocd-server
      volumeMounts:
        - mountPath: /custom-bin
          name: argocd-server-patched-bin
  volumeMounts:
    - mountPath: /usr/local/bin/argocd-server
      name: argocd-server-patched-bin
      subPath: argocd-server
  volumes:
    - name: argocd-server-patched-bin
      emptyDir: {}
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
          topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

repoServer:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 1Gi
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-repo-server
          topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

controller:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - electgo-mgmt-gitops

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - electgo-mgmt-gitops
