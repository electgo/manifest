apiVersion: v1
kind: Secret
metadata:
  name: postgresql-eks-to-mgmt-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "aaf5361033e6c4e0eb792555466d3437-e234638ad4a10314.elb.ap-southeast-3.amazonaws.com"
  source-user: "${POSTGRES_SOURCE_USER}"
  source-password: "${POSTGRES_SOURCE_PASSWORD}"
  target-host: "postgresql.database.svc.cluster.local"
  target-user: "${POSTGRES_MGMT_TARGET_USER}"
  target-password: "${POSTGRES_MGMT_TARGET_PASSWORD}"
  databases: "openproject"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-eks-to-mgmt
  namespace: database
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pg-migrate
          image: postgres:18
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 5Gi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 10Gi
          env:
            - name: SRC_HOST
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: source-host } }
            - name: SRC_USER
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: source-user } }
            - name: PGPASSWORD_SRC
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: source-password } }
            - name: TGT_HOST
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: target-host } }
            - name: TGT_USER
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: target-user } }
            - name: PGPASSWORD_TGT
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: target-password } }
            - name: DATABASES
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-mgmt-credentials, key: databases } }
          command:
            - /bin/bash
            - -c
            - |
              set -uo pipefail
              failed=""; ok=0
              for db in $DATABASES; do
                case "$db" in (*[!a-zA-Z0-9_]*|'') echo "invalid database name: $db" >&2; exit 1;; esac
                dump="/tmp/${db}.sql.gz"
                PGPASSWORD="$PGPASSWORD_SRC" pg_dump -h "$SRC_HOST" -U "$SRC_USER" -d "$db" --if-exists --clean | gzip > "$dump"
                dump_rc=${PIPESTATUS[0]}
                if [ "$dump_rc" -ne 0 ]; then failed="$failed $db(dump)"; continue; fi
                PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = :'db'" -v "db=$db" | grep -q 1 || PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -c "CREATE DATABASE \"$db\""
                zcat "$dump" | PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d "$db" -v ON_ERROR_STOP=1
                restore_rc=${PIPESTATUS[1]}
                if [ "$restore_rc" -ne 0 ]; then failed="$failed $db(restore)"; else ok=$((ok+1)); fi
                rm -f "$dump"
              done
              echo "postgresql mgmt migration complete ok=$ok failed=$failed"
              [ -n "$failed" ] && exit 1
