apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-eks-to-mgmt
  namespace: database
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: kafka-migrate
          image: apache/kafka:4.3.0
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: SOURCE_BOOTSTRAP
              value: "kafka-main-kafka-bootstrap.database.svc.cluster.local:9092"
            - name: TARGET_BOOTSTRAP
              value: "10.20.138.78:31092"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              mkdir -p /tmp/kafka-mm2
              cat > /tmp/kafka-mm2/connect-mirror-maker.properties <<EOF
              clusters=source,target
              source.bootstrap.servers=${SOURCE_BOOTSTRAP}
              target.bootstrap.servers=${TARGET_BOOTSTRAP}
              source->target.enabled=true
              source->target.topics=.*
              source->target.groups=.*
              source->target.emit.heartbeats.enabled=true
              source->target.emit.checkpoints.enabled=true
              source->target.sync.topic.configs.enabled=true
              source->target.sync.group.offsets.enabled=true
              replication.policy.class=org.apache.kafka.connect.mirror.IdentityReplicationPolicy
              replication.factor=1
              checkpoints.topic.replication.factor=1
              heartbeats.topic.replication.factor=1
              offset-syncs.topic.replication.factor=1
              config.storage.replication.factor=1
              offset.storage.replication.factor=1
              status.storage.replication.factor=1
              tasks.max=2
              EOF
              /opt/kafka/bin/connect-mirror-maker.sh /tmp/kafka-mm2/connect-mirror-maker.properties &
              mm2_pid=$!
              for i in $(seq 1 120); do
                source_count=$(/opt/kafka/bin/kafka-topics.sh --bootstrap-server "$SOURCE_BOOTSTRAP" --list | wc -l)
                target_count=$(/opt/kafka/bin/kafka-topics.sh --bootstrap-server "$TARGET_BOOTSTRAP" --list | wc -l)
                echo "kafka mirror progress source_topics=$source_count target_topics=$target_count"
                [ "$target_count" -ge "$source_count" ] && break
                sleep 30
              done
              kill "$mm2_pid" || true
              wait "$mm2_pid" || true
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$TARGET_BOOTSTRAP" --list
              echo "kafka migration complete"
