apiVersion: v1
kind: Secret
metadata:
  name: mysql-eks-to-dev-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "a5d52b3b5ebc141bdb6f2617f8851de1-d1e7d031019415f7.elb.ap-southeast-3.amazonaws.com"
  source-user: "pim_dev"
  source-password: "qwYPGtKpvBAPHLOsYdMpplxl"
  target-host: "mysql.database.svc.cluster.local"
  target-user: "root"
  target-password: "dev-mysql-2026-secure"
  app-user: "pim_dev"
  app-password: "qwYPGtKpvBAPHLOsYdMpplxl"
  databases: "pim_bucket_upload_dev pim_chatbot_dev pim_chatbot_staging_dev pim_crm_dev pim_indo_dev pim_master_dev pim_partners_app_dev pim_partners_dev pim_partners_punchout_dev pim_partners_staging_dev pim_staging_dev pim_staging_id_dev product_ai_enrich_dev product_recommendation_dev punchout_dev jagoan_dev electgo_bucket_dev"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-eks-to-dev
  namespace: database
spec:
  activeDeadlineSeconds: 14400
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mysql-migrate
          image: mysql:8
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
              ephemeral-storage: 10Gi
            limits:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 20Gi
          env:
            - name: SRC_HOST
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: source-host } }
            - name: SRC_USER
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: source-user } }
            - name: SRC_PASS
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: source-password } }
            - name: TGT_HOST
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: target-host } }
            - name: TGT_USER
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: target-user } }
            - name: TGT_PASS
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: target-password } }
            - name: APP_USER
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: app-user } }
            - name: APP_PASS
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: app-password } }
            - name: DATABASES
              valueFrom: { secretKeyRef: { name: mysql-eks-to-dev-credentials, key: databases } }
          command:
            - /bin/bash
            - -c
            - |
              set -uo pipefail
              echo ">>> step 1/3: bootstrap target - create app user"
              MYSQL_PWD="$TGT_PASS" mysql -h "$TGT_HOST" -u "$TGT_USER" -e "
                CREATE USER IF NOT EXISTS '$APP_USER'@'%' IDENTIFIED BY '$APP_PASS';
                CREATE USER IF NOT EXISTS '$APP_USER'@'localhost' IDENTIFIED BY '$APP_PASS';
              " 2>&1

              echo ">>> step 2/3: dump and restore databases"
              failed=""; ok=0
              for db in $DATABASES; do
                echo "  --> $db"
                dump="/tmp/${db}.sql.gz"
                # Dump from source
                MYSQL_PWD="$SRC_PASS" mysqldump -h "$SRC_HOST" -u "$SRC_USER" \
                  --databases "$db" \
                  --single-transaction --skip-lock-tables \
                  --set-gtid-purged=OFF --routines --triggers --events \
                  --hex-blob --no-tablespaces --column-statistics=0 2>/tmp/${db}.dump.err | gzip > "$dump"
                dump_rc=${PIPESTATUS[0]}
                if [ "$dump_rc" -ne 0 ]; then
                  echo "    DUMP FAILED rc=$dump_rc:"; cat /tmp/${db}.dump.err
                  failed="$failed $db(dump)"; continue
                fi
                # Restore to target
                zcat "$dump" | MYSQL_PWD="$TGT_PASS" mysql -h "$TGT_HOST" -u "$TGT_USER" \
                  --force --max-allowed-packet=512M 2>/tmp/${db}.restore.err
                restore_rc=${PIPESTATUS[1]}
                if [ "$restore_rc" -ne 0 ]; then
                  echo "    RESTORE FAILED rc=$restore_rc:"; tail -20 /tmp/${db}.restore.err
                  failed="$failed $db(restore)"; continue
                fi
                echo "    ok: $(stat -c%s "$dump" | numfmt --to=iec) compressed"
                ok=$((ok+1))
                rm -f "$dump" /tmp/${db}.dump.err /tmp/${db}.restore.err
              done

              echo ">>> step 3/3: grant app user privileges on all migrated DBs"
              for db in $DATABASES; do
                MYSQL_PWD="$TGT_PASS" mysql -h "$TGT_HOST" -u "$TGT_USER" -e \
                  "GRANT ALL PRIVILEGES ON \`${db}\`.* TO '$APP_USER'@'%'; GRANT ALL PRIVILEGES ON \`${db}\`.* TO '$APP_USER'@'localhost';" 2>&1
              done
              MYSQL_PWD="$TGT_PASS" mysql -h "$TGT_HOST" -u "$TGT_USER" -e "FLUSH PRIVILEGES;" 2>&1

              echo "mysql migration complete ok=$ok failed='$failed'"
              [ -n "$failed" ] && exit 1
