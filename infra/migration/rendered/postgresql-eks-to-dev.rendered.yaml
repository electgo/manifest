apiVersion: v1
kind: Secret
metadata:
  name: postgresql-eks-to-dev-credentials
  namespace: database
type: Opaque
stringData:
  target-host: "postgresql.database.svc.cluster.local"
  target-user: "postgres"
  target-password: "dev-pg-2026-secure"
  app-user-n8n: "n8n_development"
  app-password-n8n: "fxlRpsmHnBwkcZHaUSUzjc60pLzIbwmIV2NQjgxi"
  app-user-zitadel: "zitadel"
  app-password-zitadel: "ElectGo2026Pg"
  databases: "n8n_development zitadelv3"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-eks-to-dev
  namespace: database
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pg-bootstrap
          image: postgres:18
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 2Gi
          env:
            - name: TGT_HOST
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: target-host } }
            - name: TGT_USER
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: target-user } }
            - name: PGPASSWORD_TGT
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: target-password } }
            - name: APP_USER_N8N
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: app-user-n8n } }
            - name: APP_PASSWORD_N8N
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: app-password-n8n } }
            - name: APP_USER_ZITADEL
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: app-user-zitadel } }
            - name: APP_PASSWORD_ZITADEL
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: app-password-zitadel } }
            - name: DATABASES
              valueFrom: { secretKeyRef: { name: postgresql-eks-to-dev-credentials, key: databases } }
          command:
            - /bin/bash
            - -c
            - |
              set -uo pipefail
              echo ">>> step 1/3: bootstrap target roles"
              PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -v ON_ERROR_STOP=1 -c "
                CREATE ROLE \"$APP_USER_N8N\" WITH LOGIN PASSWORD '$APP_PASSWORD_N8N';
                CREATE ROLE \"$APP_USER_ZITADEL\" WITH LOGIN PASSWORD '$APP_PASSWORD_ZITADEL';
              " 2>&1 | tail -5

              echo ">>> step 2/3: create databases with proper ownership"
              for db in $DATABASES; do
                app_user=""
                case "$db" in
                  n8n_*) app_user="$APP_USER_N8N" ;;
                  zitadel*) app_user="$APP_USER_ZITADEL" ;;
                esac
                exists=$(PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$db'" 2>/dev/null || echo "")
                if [ "$exists" = "1" ]; then
                  echo "  DB $db already exists, leaving as-is"
                else
                  PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -v ON_ERROR_STOP=1 -c "
                    CREATE DATABASE \"$db\" OWNER \"$app_user\";
                  " 2>&1 | tail -2
                fi
                PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d "$db" -v ON_ERROR_STOP=1 -c "
                  GRANT ALL ON SCHEMA public TO \"$app_user\";
                  ALTER SCHEMA public OWNER TO \"$app_user\";
                " 2>&1 | tail -2
              done

              echo ">>> step 3/3: verify"
              PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -c '\l' 2>&1
              PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres -c '\du' 2>&1

              echo "postgresql bootstrap complete (no data - apps scaled to 0 in dev; EKS PG superuser not available)"
              echo "NOTE: data import from EKS PG requires EKS PG superuser credentials - blocked on human input"
              exit 0
