prometheus:
  prometheusSpec:
    nodeSelector:
      workload: observe
    tolerations: []
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-encrypted
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
grafana:
  nodeSelector:
    workload: observe
  persistence:
    enabled: true
    storageClassName: gp3-encrypted
    size: 10Gi
alertmanager:
  alertmanagerSpec:
    nodeSelector:
      workload: observe
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-encrypted
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
