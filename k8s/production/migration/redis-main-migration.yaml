apiVersion: v1
kind: Secret
metadata:
  name: redis-main-migration-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "52.74.252.4"
  source-port: "6379"
  source-password: "36xU2FvrrW5rqRlJ"
  target-host: "redis-main.database.svc.cluster.local"
  target-port: "6379"
  target-password: "Migr8Pass2026!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-main-migration
  namespace: database
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: redis-migrate
        image: python:3.12-slim
        env:
        - name: SRC_HOST
          valueFrom: { secretKeyRef: { name: redis-main-migration-credentials, key: source-host } }
        - name: SRC_PORT
          valueFrom: { secretKeyRef: { name: redis-main-migration-credentials, key: source-port } }
        - name: SRC_PASS
          valueFrom: { secretKeyRef: { name: redis-main-migration-credentials, key: source-password } }
        - name: TGT_HOST
          valueFrom: { secretKeyRef: { name: redis-main-migration-credentials, key: target-host } }
        - name: TGT_PORT
          valueFrom: { secretKeyRef: { name: redis-main-migration-credentials, key: target-port } }
        - name: TGT_PASS
          valueFrom: { secretKeyRef: { name: redis-main-migration-credentials, key: target-password } }
        command:
        - /bin/bash
        - -c
        - |
          set -uo pipefail
          pip install --quiet redis
          python - <<'PY'
          import os, redis
          src = redis.Redis(host=os.environ['SRC_HOST'], port=int(os.environ['SRC_PORT']),
                            password=os.environ['SRC_PASS'], decode_responses=False, socket_timeout=30)
          tgt = redis.Redis(host=os.environ['TGT_HOST'], port=int(os.environ['TGT_PORT']),
                            password=os.environ['TGT_PASS'], decode_responses=False, socket_timeout=30)
          print(f"Source keys: {src.dbsize()}  Target before: {tgt.dbsize()}")
          ok = fail = 0
          for key in src.scan_iter(count=1000):
              try:
                  ttl = src.pttl(key)
                  ttl = ttl if ttl and ttl > 0 else 0
                  data = src.dump(key)
                  if data is None:
                      fail += 1; continue
                  tgt.restore(key, ttl, data, replace=True)
                  ok += 1
              except Exception as e:
                  fail += 1
                  print(f"FAIL {key!r}: {e}")
          print(f"Target after: {tgt.dbsize()}  ok={ok} fail={fail}")
          PY
