apiVersion: v1
kind: Secret
metadata:
  name: postgres-jagoanhosting-migration-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "103.27.206.86"
  source-port: "5432"
  modoboa-user: "modoboa"
  modoboa-password: "4sqvOvISNNZ6MIP0"
  op-user: "op_admin"
  op-password: "1HbwkrgrOvsV"
  target-host: "postgres-main-pg-db-primary.database.svc.cluster.local"
  target-user: "postgres"
  target-password: "ElectGo2026Pg"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-jagoanhosting-migration
  namespace: database
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: pg-migrate
        image: postgres:18.3
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 2Gi
          limits:
            cpu: 2
            memory: 2Gi
            ephemeral-storage: 5Gi
        env:
        - name: SRC_HOST
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: source-host } }
        - name: SRC_PORT
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: source-port } }
        - name: MODOBOA_USER
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: modoboa-user } }
        - name: MODOBOA_PASS
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: modoboa-password } }
        - name: OP_USER
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: op-user } }
        - name: OP_PASS
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: op-password } }
        - name: TGT_HOST
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: target-host } }
        - name: TGT_USER
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: target-user } }
        - name: PGPASSWORD_TGT
          valueFrom: { secretKeyRef: { name: postgres-jagoanhosting-migration-credentials, key: target-password } }
        command:
        - /bin/bash
        - -c
        - |
          set -uo pipefail
          echo "Source: $SRC_HOST:$SRC_PORT (PG14)  Target: $TGT_HOST"
          FAILED=""; OK=0
          migrate_db() {
            local DB=$1 USER=$2 PASS=$3
            echo "============================="
            echo "DUMP $DB (user=$USER) at $(date)"
            DUMP=/tmp/${DB}.dump
            PGPASSWORD="$PASS" pg_dump -h "$SRC_HOST" -p "$SRC_PORT" -U "$USER" -d "$DB" \
              --no-owner --no-privileges --if-exists --clean -Fc -f "$DUMP" 2>/tmp/dump.err
            local DUMP_RC=$?
            local SZ=$(du -h "$DUMP" 2>/dev/null | cut -f1)
            echo "dump rc=$DUMP_RC size=$SZ"
            if [ "$DUMP_RC" -ne 0 ]; then
              echo "DUMP STDERR:"; cat /tmp/dump.err; FAILED="$FAILED $DB(dump)"; return 1
            fi
            PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres \
              -tc "SELECT 1 FROM pg_database WHERE datname='$DB'" | grep -q 1 \
              || PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres \
                  -c "CREATE DATABASE \"$DB\""
            echo "RESTORE $DB at $(date)"
            PGPASSWORD="$PGPASSWORD_TGT" pg_restore -h "$TGT_HOST" -U "$TGT_USER" -d "$DB" \
              --no-owner --no-privileges --clean --if-exists "$DUMP" 2>/tmp/restore.err
            local REST_RC=$?
            echo "restore rc=$REST_RC"
            [ "$REST_RC" -ne 0 ] && tail -30 /tmp/restore.err
            local SRC_TBL=$(PGPASSWORD="$PASS" psql -h "$SRC_HOST" -p "$SRC_PORT" -U "$USER" -d "$DB" \
              -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema NOT IN ('pg_catalog','information_schema')")
            local TGT_TBL=$(PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d "$DB" \
              -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema NOT IN ('pg_catalog','information_schema')")
            echo "tables src=$SRC_TBL tgt=$TGT_TBL"
            [ "$SRC_TBL" = "$TGT_TBL" ] || echo "WARN: $DB table count mismatch"
            OK=$((OK+1))
            rm -f "$DUMP"
          }
          migrate_db modoboa "$MODOBOA_USER" "$MODOBOA_PASS" || true
          migrate_db openproject "$OP_USER" "$OP_PASS" || true
          migrate_db electgo_op "$OP_USER" "$OP_PASS" || true
          echo "============================="
          echo "Done at $(date). Success: $OK"
          [ -n "$FAILED" ] && { echo "Failed:$FAILED"; exit 1; }
          exit 0
