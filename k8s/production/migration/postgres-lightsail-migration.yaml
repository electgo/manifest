apiVersion: v1
kind: Secret
metadata:
  name: postgres-lightsail-migration-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "ls-d7f0eb15926c1e43e66aa3386c30ac683e54d2f4.clc58bmqhdz9.ap-southeast-1.rds.amazonaws.com"
  source-user: "dbmasteruser"
  source-password: "wB{7eD=biLaN_{XTTB6gPL~^*J]90gN|"
  target-host: "postgres-main-pg-db-primary.database.svc.cluster.local"
  target-user: "postgres"
  target-password: "ElectGo2026Pg"
  databases: "dbmaster chatbot_ev chatbot_knowledge electgo_chatbot electgo_chatbot_staging electgo_tools electgo_tools_staging etools_chatbot_be etools_chatbot_be_staging n8n_production"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-lightsail-migration
  namespace: database
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: pg-migrate
        image: postgres:18.3
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 5Gi
          limits:
            cpu: 2
            memory: 2Gi
            ephemeral-storage: 10Gi
        env:
        - name: SRC_HOST
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: source-host } }
        - name: SRC_USER
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: source-user } }
        - name: PGPASSWORD_SRC
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: source-password } }
        - name: TGT_HOST
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: target-host } }
        - name: TGT_USER
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: target-user } }
        - name: PGPASSWORD_TGT
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: target-password } }
        - name: DATABASES
          valueFrom: { secretKeyRef: { name: postgres-lightsail-migration-credentials, key: databases } }
        command:
        - /bin/bash
        - -c
        - |
          set -uo pipefail
          echo "Source: $SRC_HOST  Target: $TGT_HOST  DBs: $DATABASES"
          FAILED=""; OK=0
          for DB in $DATABASES; do
            echo "============================="
            echo "DUMP $DB at $(date)"
            DUMP=/tmp/${DB}.sql.gz
            PGPASSWORD="$PGPASSWORD_SRC" pg_dump -h "$SRC_HOST" -U "$SRC_USER" -d "$DB" \
              --no-owner --no-privileges --if-exists --clean 2>/tmp/dump.err | gzip > "$DUMP"
            DUMP_RC=${PIPESTATUS[0]}
            SZ=$(du -h "$DUMP" | cut -f1)
            echo "dump rc=$DUMP_RC size=$SZ"
            if [ "$DUMP_RC" -ne 0 ]; then
              echo "DUMP STDERR:"; cat /tmp/dump.err; FAILED="$FAILED $DB(dump)"; continue
            fi
            echo "CREATE DB on target if not exist"
            PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres \
              -tc "SELECT 1 FROM pg_database WHERE datname='$DB'" | grep -q 1 \
              || PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d postgres \
                  -c "CREATE DATABASE \"$DB\""
            echo "RESTORE $DB at $(date)"
            zcat "$DUMP" | PGPASSWORD="$PGPASSWORD_TGT" psql -h "$TGT_HOST" -U "$TGT_USER" -d "$DB" \
              -v ON_ERROR_STOP=0 2>/tmp/restore.err
            REST_RC=${PIPESTATUS[1]}
            echo "restore rc=$REST_RC"
            if [ "$REST_RC" -ne 0 ]; then
              echo "RESTORE STDERR (tail):"; tail -30 /tmp/restore.err
              FAILED="$FAILED $DB(restore)"; continue
            fi
            OK=$((OK+1))
            rm -f "$DUMP"
          done
          echo "============================="
          echo "Done at $(date). Success: $OK"
          [ -n "$FAILED" ] && { echo "Failed:$FAILED"; exit 1; }
          exit 0
