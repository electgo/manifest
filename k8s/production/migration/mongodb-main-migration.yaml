apiVersion: v1
kind: Secret
metadata:
  name: mongodb-main-migration-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "52.74.252.4"
  source-port: "27017"
  source-user: "electgo_owner"
  source-password: "1C9WEywsHymsIfBu"
  source-db: "electgo"
  source-authdb: "admin"
  target-host: "mongodb-main-rs0.database.svc.cluster.local"
  target-port: "27017"
  target-db: "electgo"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-main-migration
  namespace: database
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: mongo-migrate
        image: mongo:7.0.24
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 5Gi
          limits:
            cpu: 2
            memory: 2Gi
            ephemeral-storage: 10Gi
        env:
        - name: SRC_HOST
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: source-host } }
        - name: SRC_PORT
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: source-port } }
        - name: SRC_USER
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: source-user } }
        - name: SRC_PASS
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: source-password } }
        - name: SRC_DB
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: source-db } }
        - name: SRC_AUTH
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: source-authdb } }
        - name: TGT_HOST
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: target-host } }
        - name: TGT_DB
          valueFrom: { secretKeyRef: { name: mongodb-main-migration-credentials, key: target-db } }
        - name: TGT_USER
          valueFrom: { secretKeyRef: { name: mongodb-main-secrets, key: MONGODB_DATABASE_ADMIN_USER } }
        - name: TGT_PASS
          valueFrom: { secretKeyRef: { name: mongodb-main-secrets, key: MONGODB_DATABASE_ADMIN_PASSWORD } }
        command:
        - /bin/bash
        - -c
        - |
          set -uo pipefail
          echo "Source: $SRC_HOST:$SRC_PORT/$SRC_DB  Target: $TGT_HOST/$TGT_DB"
          mkdir -p /tmp/dump
          echo "--- mongodump ---"
          mongodump --host="$SRC_HOST" --port="$SRC_PORT" \
            --username="$SRC_USER" --password="$SRC_PASS" \
            --authenticationDatabase="$SRC_AUTH" \
            --db="$SRC_DB" --out=/tmp/dump 2>&1 | tail -10
          echo "--- mongorestore ---"
          mongorestore --uri="mongodb://$TGT_USER:$TGT_PASS@$TGT_HOST:27017/?authSource=admin&replicaSet=rs0" \
            --drop --nsInclude="$SRC_DB.*" --dir=/tmp/dump 2>&1 | tail -30
          echo "--- validate ---"
          mongosh "mongodb://$TGT_USER:$TGT_PASS@$TGT_HOST:27017/$TGT_DB?authSource=admin&replicaSet=rs0" \
            --quiet --eval 'db.getCollectionNames().forEach(c=>print(c+": "+db.getCollection(c).estimatedDocumentCount()))'
          echo "Done"
