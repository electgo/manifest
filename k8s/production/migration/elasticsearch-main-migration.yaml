apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-main-migration-credentials
  namespace: database
type: Opaque
stringData:
  source-host: "13.251.108.93"
  source-port: "9200"
  source-user: "elastic"
  source-password: "ResetMe2026Pass!"
  target-host: "elasticsearch-main-es-http.database.svc.cluster.local"
  target-port: "9200"
  target-user: "elastic"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-main-migration
  namespace: database
spec:
  activeDeadlineSeconds: 7200
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: es-migrate
        image: curlimages/curl:8.15.0
        env:
        - name: SRC_HOST
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: source-host } }
        - name: SRC_PORT
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: source-port } }
        - name: SRC_USER
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: source-user } }
        - name: SRC_PASS
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: source-password } }
        - name: TGT_HOST
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: target-host } }
        - name: TGT_PORT
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: target-port } }
        - name: TGT_USER
          valueFrom: { secretKeyRef: { name: elasticsearch-main-migration-credentials, key: target-user } }
        - name: TGT_PASS
          valueFrom: { secretKeyRef: { name: elasticsearch-main-es-elastic-user, key: elastic } }
        command:
        - /bin/sh
        - -c
        - |
          set -u
          SRC="http://$SRC_USER:$SRC_PASS@$SRC_HOST:$SRC_PORT"
          TGT="http://$TGT_USER:$TGT_PASS@$TGT_HOST:$TGT_PORT"
          echo "Source: $SRC_HOST  Target: $TGT_HOST"
          INDICES=$(curl -sk "$SRC/_cat/indices?h=index" | grep -v "^\." | sort)
          echo "Indices: $INDICES"
          OK=0; FAIL=""
          for IDX in $INDICES; do
            echo "============================="
            echo "REINDEX $IDX"
            BODY=$(printf '{"source":{"remote":{"host":"http://%s:%s","username":"%s","password":"%s"},"index":"%s"},"dest":{"index":"%s"}}' \
              "$SRC_HOST" "$SRC_PORT" "$SRC_USER" "$SRC_PASS" "$IDX" "$IDX")
            RESP=$(curl -sk -X POST "$TGT/_reindex?wait_for_completion=true&timeout=30m" \
              -H 'Content-Type: application/json' -d "$BODY")
            echo "$RESP" | head -c 800; echo
            if echo "$RESP" | grep -q '"failures":\[\]'; then
              OK=$((OK+1))
            else
              FAIL="$FAIL $IDX"
            fi
          done
          echo "============================="
          echo "Done. OK=$OK Failed:$FAIL"
          [ -n "$FAIL" ] && exit 1 || exit 0
