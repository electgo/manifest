apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.66.0
          env:
            - name: REDIS_ADDR
              value: redis://redis-main.database:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-main-secret
                  key: password
          ports:
            - name: metrics
              containerPort: 9121
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    app.kubernetes.io/name: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: database
  labels:
    release: kps
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
