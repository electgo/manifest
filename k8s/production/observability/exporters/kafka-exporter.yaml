apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.9.0
          args:
            - --kafka.server=kafka-main-kafka-bootstrap.database:9092
            - --kafka.version=3.7.0
            - --web.listen-address=:9308
          ports:
            - name: metrics
              containerPort: 9308
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    app.kubernetes.io/name: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-exporter
  namespace: database
  labels:
    release: kps
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
