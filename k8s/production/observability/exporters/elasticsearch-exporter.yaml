apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: elasticsearch-exporter
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch-exporter
    spec:
      containers:
        - name: elasticsearch-exporter
          image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.9.0
          args:
            - --es.uri=http://$(ES_USER):$(ES_PASSWORD)@elasticsearch-main-es-http.database:9200
            - --es.all
            - --es.indices
            - --es.indices_settings
            - --es.indices_mappings
            - --es.shards
            - --es.timeout=10s
            - --web.listen-address=:9114
          env:
            - name: ES_USER
              value: elastic
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-main-es-elastic-user
                  key: elastic
          ports:
            - name: metrics
              containerPort: 9114
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: elasticsearch-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    app.kubernetes.io/name: elasticsearch-exporter
  ports:
    - name: metrics
      port: 9114
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: elasticsearch-exporter
  namespace: database
  labels:
    release: kps
    app.kubernetes.io/name: elasticsearch-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
