apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: mysql-exporter
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql-exporter
    spec:
      containers:
        - name: mysqld-exporter
          image: prom/mysqld-exporter:v0.15.1
          args:
            - --mysqld.address=mysql-main-mysql.database:3306
            - --mysqld.username=monitor
            - --collect.global_status
            - --collect.global_variables
            - --collect.info_schema.innodb_metrics
            - --collect.info_schema.processlist
            - --collect.info_schema.tables
            - --collect.slave_status
          env:
            # Password for the operator-built `monitor` user (READ-only privs).
            - name: MYSQLD_EXPORTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-main-secrets
                  key: monitor
          ports:
            - name: metrics
              containerPort: 9104
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: mysql-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    app.kubernetes.io/name: mysql-exporter
  ports:
    - name: metrics
      port: 9104
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mysql-exporter
  namespace: database
  labels:
    release: kps
    app.kubernetes.io/name: mysql-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
