apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: mongodb-exporter
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.42
          args:
            - --compatible-mode
            - --collect-all
            - --discovering-mode
            - --mongodb.global-conn-pool
          env:
            # PSMDB operator pre-creates a clusterMonitor user with the
            # `clusterMonitor` role. Reuse those credentials.
            - name: MONGODB_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-main-secrets
                  key: MONGODB_CLUSTER_MONITOR_USER
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-main-secrets
                  key: MONGODB_CLUSTER_MONITOR_PASSWORD
            - name: MONGODB_URI
              value: mongodb://$(MONGODB_USER):$(MONGODB_PASSWORD)@mongodb-main-rs0.database:27017/admin?replicaSet=rs0&authSource=admin
          ports:
            - name: metrics
              containerPort: 9216
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-exporter
  namespace: database
  labels:
    app.kubernetes.io/name: mongodb-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    app.kubernetes.io/name: mongodb-exporter
  ports:
    - name: metrics
      port: 9216
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-exporter
  namespace: database
  labels:
    release: kps
    app.kubernetes.io/name: mongodb-exporter
    app.kubernetes.io/part-of: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
