kind: CronJob
metadata:
  name: pim-magento-report-customer
  namespace: pim-master
  labels:
    app.kubernetes.io/part-of: pim
    app.kubernetes.io/managed-by: k8s-cronjob-migration
    legacy-source: electgoaws-v2
  annotations:
    legacy.source: "ElectgoAWS-v2:/var/spool/cron/crontabs/ubuntu"
spec:
  suspend: false
  schedule: "3 2,14 * * *"
  timeZone: "Asia/Singapore"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: pim
            app.kubernetes.io/cron: pim-magento-report-customer
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            node-role: worker
          securityContext:
            fsGroup: 33
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: pim-master
                    app.kubernetes.io/name: pim
                topologyKey: kubernetes.io/hostname
          containers:
          - name: magento-report-customer
            image: zot.electgo.com/pim-master:prod-3d9a3a31
            imagePullPolicy: IfNotPresent
            command: ["php"]
            args: ["/var/www/html/public/index.php", "magentoreport", "syncmgreportcustomer", "default"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsNonRoot: true
              runAsUser: 33
            resources:
              requests: {cpu: 50m, memory: 128Mi}
              limits: {cpu: 1000m, memory: 1Gi}
            volumeMounts:
            - name: env-file
              mountPath: /var/www/html/.env
              subPath: .env
              readOnly: true
            - name: writable
              mountPath: /var/www/html/writable
            - name: exported
              mountPath: /var/www/html/public/exported
            - name: media
              mountPath: /var/www/html/public/media
            - name: pdf
              mountPath: /var/www/html/public/pdf
          volumes:
          - name: env-file
            secret:
              secretName: pim-master-env
              items:
              - key: .env
                path: .env
          - name: writable
            persistentVolumeClaim:
              claimName: pim-master-writable
          - name: exported
            persistentVolumeClaim:
              claimName: pim-master-exported
          - name: media
            persistentVolumeClaim:
              claimName: pim-master-media
          - name: pdf
            persistentVolumeClaim:
              claimName: pim-master-pdf
