apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch-main
  namespace: database
spec:
  version: 8.18.0
  nodeSets:
  - name: default
    count: 1
    config:
      node.store.allow_mmap: false
      reindex.remote.whitelist: "13.251.108.93:9200"
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
            limits:
              cpu: 2
              memory: 4Gi
          env:
          - name: ES_JAVA_OPTS
            value: "-Xms1g -Xmx1g"
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: efs-sc-electgo
  http:
    tls:
      selfSignedCertificate:
        disabled: true
