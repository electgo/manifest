apiVersion: v1
kind: Secret
metadata:
  name: redis-main-secret
  namespace: database
type: Opaque
stringData:
  password: "8a243a4b9bef8bc1e84f0c94ca2cc14f5b2b9f703eb2226f"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-main-acl
  namespace: database
type: Opaque
stringData:
  user.acl: |
    user default on >8a243a4b9bef8bc1e84f0c94ca2cc14f5b2b9f703eb2226f ~* &* +@all
    user developer on >9888a00282bf17eb6ed8a4cb81d22d546371a3648c7ca155 ~* &* +@all -@dangerous
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-main
  namespace: database
spec:
  acl:
    secret:
      secretName: redis-main-acl
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    redisSecret:
      name: redis-main-secret
      key: password
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  # Live PVC was provisioned 1Gi on efs-sc-electgo during migration days.
  # Keep CR aligned with live PVC — Opstree operator tries a PVC resize when
  # spec.storage > live capacity and fails on non-expandable SCs, blocking
  # every reconcile (including resource bumps). See [[feedback-redis-pvc-storage-drift]].
  # To grow: snapshot → recreate on gp3-encrypted with desired size during maintenance.
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: efs-sc-electgo
        resources:
          requests:
            storage: 1Gi
