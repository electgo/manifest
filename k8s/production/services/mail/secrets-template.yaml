# Apply ONCE manually (NOT committed to Argo) — these hold sensitive material.
# After applying, recreate with new values if rotation is needed.
#
# Generate values:
#   SECRET_KEY=$(python3 -c 'import secrets,string; print("".join(secrets.choice(string.ascii_letters+string.digits) for _ in range(16)))')
#   DB_PASS=$(openssl rand -base64 24 | tr -d "=+/" | head -c 24)
#
# Then create the Secret:
#   kubectl -n mail create secret generic mailu-secret \
#     --from-literal=secret-key="$SECRET_KEY" \
#     --from-literal=db-password="$DB_PASS"
#
# And add the same DB password to the Percona PG users list in postgres-values.yaml under
# users[].name=mailu so the cluster provisions the role with that password.
---
apiVersion: v1
kind: Secret
metadata:
  name: mailu-secret
  namespace: mail
type: Opaque
stringData:
  secret-key: "REPLACE_ME_16_CHAR_ALNUM"
  db-password: "REPLACE_ME_PG_PASSWORD"
