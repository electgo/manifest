apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: magento-cloud-cli-installer
  namespace: default
  labels:
    app.kubernetes.io/name: magento-cloud-cli-installer
    app.kubernetes.io/component: tooling
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: magento-cloud-cli-installer
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magento-cloud-cli-installer
    spec:
      nodeSelector:
        magento-cloud-cli: "true"
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      containers:
        - name: installer
          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            - /bin/sh
            - -lc
            - |
              set -eu

              reconcile() {
                TOKEN_FILE=/var/secret/token/MAGENTO_CLOUD_CLI_TOKEN
                [ -s "$TOKEN_FILE" ] || { echo "$(date -Is) missing token file"; return 1; }
                TOKEN="$(cat "$TOKEN_FILE")"

                # 1) Ensure php-cli + extensions installed on host
                if ! chroot /host /bin/sh -lc 'command -v php >/dev/null 2>&1'; then
                  echo "$(date -Is) installing php-cli + extensions"
                  chroot /host /bin/sh -lc 'dnf install -y --allowerasing php-cli php-mbstring php-xml php-json php-curl php-zip php-phar'
                fi

                # 2) Ensure git + php-process
                chroot /host /bin/sh -lc 'rpm -q git >/dev/null 2>&1' \
                  || chroot /host /bin/sh -lc 'dnf install -y --allowerasing git'
                chroot /host /bin/sh -lc 'rpm -q php-process >/dev/null 2>&1 || rpm -qa | grep -q "^php[0-9.]*-process"' \
                  || chroot /host /bin/sh -lc 'dnf install -y --allowerasing php-process'

                # 3) Ensure magento-cloud binary
                if ! chroot /host /bin/sh -lc 'command -v magento-cloud >/dev/null 2>&1'; then
                  echo "$(date -Is) installing magento-cloud CLI"
                  chroot /host /bin/sh -lc '
                    set -eu
                    curl -fsSL https://accounts.magento.cloud/cli/installer -o /tmp/mc-installer.php
                    HOME=/root php /tmp/mc-installer.php
                    rm -f /tmp/mc-installer.php
                    if   [ -x /root/.magento-cloud/bin/magento-cloud ]; then ln -sf /root/.magento-cloud/bin/magento-cloud /usr/local/bin/magento-cloud
                    elif [ -x /root/magento-cloud/bin/magento-cloud ];  then ln -sf /root/magento-cloud/bin/magento-cloud /usr/local/bin/magento-cloud
                    fi
                  '
                fi

                # 4) Persist token in /etc/profile.d (root-only, idempotent)
                FILE=/host/etc/profile.d/magento-cloud.sh
                DESIRED=$(printf '# Magento Cloud CLI token (root only)\nexport MAGENTO_CLOUD_CLI_TOKEN="%s"\n' "$TOKEN")
                if [ ! -f "$FILE" ] || [ "$(cat "$FILE")" != "$DESIRED" ]; then
                  echo "$(date -Is) writing $FILE"
                  umask 077
                  printf '%s' "$DESIRED" > "$FILE"
                  chmod 0600 "$FILE"
                  chown 0:0 "$FILE"
                fi

                # 5) Verify (non-fatal)
                env -i HOME=/root PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin chroot /host /bin/sh -lc '
                  HOME=/root magento-cloud --version
                  HOME=/root magento-cloud auth:info --no-interaction --property username 2>/dev/null || true
                ' || true
              }

              # Reconcile loop: idempotent, hourly
              while :; do
                if reconcile; then
                  echo "$(date -Is) reconcile ok"
                else
                  echo "$(date -Is) reconcile failed, will retry"
                fi
                sleep 3600
              done
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: token
              mountPath: /var/secret/token
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: token
          secret:
            secretName: magento-cloud-token
            defaultMode: 0400
