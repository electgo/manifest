apiVersion: v1
kind: Secret
metadata:
  name: matomo-lightsail-credentials
  namespace: database
type: Opaque
stringData:
  host: "13.228.20.249"
  port: "3306"
  username: "matomo_user"
  password: "6ZsRjOkvPQyyA4b3!"
  database: "matomo"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: matomo-migration
  namespace: database
spec:
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: pre-migration-check
        image: mysql:8.0.44
        command:
        - /bin/sh
        - -c
        - |
          echo "Checking TrackingServer MySQL connectivity..."
          mysql -h ${SOURCE_HOST} -P ${SOURCE_PORT} -u ${SOURCE_USER} -p${SOURCE_PASSWORD} \
            -e "SELECT 'TrackingServer OK' as status" 2>/dev/null

          echo "Checking K3s MySQL connectivity..."
          mysql -h mysql-main-mysql-primary.database.svc.cluster.local -P 3306 \
            -u ${TARGET_USER} -p${TARGET_PASSWORD} \
            -e "SELECT 'K3s OK' as status" 2>/dev/null

          echo "All connectivity checks passed!"
        env:
        - name: SOURCE_HOST
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: host
        - name: SOURCE_PORT
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: port
        - name: SOURCE_USER
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: username
        - name: SOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: password
        - name: TARGET_USER
          value: root
        - name: TARGET_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-main-secrets
              key: root

      containers:
      - name: matomo-migrate
        image: mysql:8.0.44
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting Matomo MySQL migration from TrackingServer to K3s..."
          echo "Source: ${SOURCE_HOST}:${SOURCE_PORT}/${SOURCE_DB}"
          echo "Target: mysql-main-mysql-primary.database.svc.cluster.local:3306"
          echo "Timestamp: $(date)"
          echo "========================================"

          TARGET="mysql-main-mysql-primary.database.svc.cluster.local"
          ERR_LOG="/tmp/matomo.err"
          DUMP_FILE="/tmp/matomo.sql"
          : > "${ERR_LOG}"

          echo "Phase 1: Tuning target MySQL..."
          MYSQL_PWD="${TARGET_PASSWORD}" mysql -h $TARGET -P 3306 -u ${TARGET_USER} \
            -e "SET GLOBAL super_read_only=OFF; SET GLOBAL read_only=OFF; SET GLOBAL max_allowed_packet=268435456; SET GLOBAL wait_timeout=28800; SET GLOBAL innodb_redo_log_capacity=4294967296; SET GLOBAL innodb_flush_log_at_trx_commit=0; SET GLOBAL sync_binlog=0;" 2>&1

          echo "Phase 2: Dumping matomo database (schema + data)..."
          MYSQL_PWD="${SOURCE_PASSWORD}" mysqldump -h ${SOURCE_HOST} -P ${SOURCE_PORT} \
            -u ${SOURCE_USER} \
            --databases ${SOURCE_DB} \
            --single-transaction \
            --skip-lock-tables \
            --set-gtid-purged=OFF \
            --routines \
            --triggers \
            --events \
            --hex-blob \
            --no-tablespaces \
            --column-statistics=0 \
            > "${DUMP_FILE}" 2>> "${ERR_LOG}"

          if [ $? -ne 0 ]; then
            echo "ERROR: dump failed"
            cat "${ERR_LOG}"
            exit 1
          fi
          echo "Dump size: $(du -h ${DUMP_FILE} | cut -f1)"

          echo "Phase 3: Restoring matomo to K3s..."
          MYSQL_PWD="${TARGET_PASSWORD}" mysql -h $TARGET -P 3306 -u ${TARGET_USER} \
            --force \
            --max-allowed-packet=256M \
            --net-buffer-length=16384 \
            --connect-timeout=300 \
            < "${DUMP_FILE}" >> "${ERR_LOG}" 2>&1

          if [ $? -ne 0 ]; then
            echo "WARNING: restore had errors, checking..."
            cat "${ERR_LOG}" | tail -20
          fi

          echo "========================================"
          echo "Phase 4: Validating table counts..."
          SRC_TABLES=$(MYSQL_PWD="${SOURCE_PASSWORD}" mysql -h ${SOURCE_HOST} -P ${SOURCE_PORT} \
            -u ${SOURCE_USER} -N -B \
            -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${SOURCE_DB}'" 2>/dev/null)
          TGT_TABLES=$(MYSQL_PWD="${TARGET_PASSWORD}" mysql -h $TARGET -P 3306 \
            -u ${TARGET_USER} -N -B \
            -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${SOURCE_DB}'" 2>/dev/null)
          echo "Tables — source: ${SRC_TABLES}, target: ${TGT_TABLES}"

          echo "Source rows (approx):"
          MYSQL_PWD="${SOURCE_PASSWORD}" mysql -h ${SOURCE_HOST} -P ${SOURCE_PORT} \
            -u ${SOURCE_USER} \
            -e "SELECT SUM(table_rows) FROM information_schema.tables WHERE table_schema='${SOURCE_DB}'" 2>/dev/null

          echo "Target rows (approx):"
          MYSQL_PWD="${TARGET_PASSWORD}" mysql -h $TARGET -P 3306 -u ${TARGET_USER} \
            -e "SELECT SUM(table_rows) FROM information_schema.tables WHERE table_schema='${SOURCE_DB}'" 2>/dev/null

          echo "========================================"
          echo "Migration completed!"
          echo "Timestamp: $(date)"
          [ "${SRC_TABLES}" = "${TGT_TABLES}" ] && echo "Table count matches ✓" || echo "WARNING: table count mismatch"
        env:
        - name: SOURCE_HOST
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: host
        - name: SOURCE_PORT
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: port
        - name: SOURCE_USER
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: username
        - name: SOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: password
        - name: SOURCE_DB
          valueFrom:
            secretKeyRef:
              name: matomo-lightsail-credentials
              key: database
        - name: TARGET_USER
          value: root
        - name: TARGET_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-main-secrets
              key: root
  backoffLimit: 3
