---
apiVersion: v1
kind: Namespace
metadata:
  name: headscale
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headscale-data
  namespace: headscale
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: headscale
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
    - name: wireguard
      port: 51820
      protocol: UDP
      targetPort: 51820
    - name: metrics
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector:
    app: headscale
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: headscale-nodeport
  namespace: headscale
spec:
  ports:
    - name: http
      port: 8080
      nodePort: 31080
      protocol: TCP
      targetPort: 8080
    - name: wireguard
      port: 51820
      nodePort: 31020
      protocol: UDP
      targetPort: 51820
  selector:
    app: headscale
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: headscale-lb
  namespace: headscale
spec:
  type: LoadBalancer
  selector:
    app: headscale
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: wireguard
      port: 51820
      targetPort: 51820
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
data:
  config.yaml: |
    server_url: https://headscale.electgo.com
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: ":50443"
    grpc_allow_insecure: false
    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
    noise:
      private_key_path: /var/lib/headscale/noise_private.key
    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite
    disable_check_updates: false
    dns:
      base_domain: vpn.electgo.internal
      magic_dns: false
      nameservers:
        global:
          - 1.1.1.1
          - 8.8.8.8
    derp:
      server:
        enabled: false
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      auto_update_enabled: true
      update_frequency: 3h
    log:
      format: text
      level: info
    policy:
      path: /etc/headscale/policy.hujson
  policy.hujson: |
    {
      "tagOwners": {
        "tag:k3s-development": ["user:admin@"],
        "tag:local": ["user:admin@"]
      },
      "autoApprovers": {
        "routes": {
          "10.42.0.0/16": ["tag:k3s-development"],
          "10.43.0.0/16": ["tag:k3s-development"],
          "10.20.0.0/20": ["tag:k3s-development"],
          "100.64.0.0/10": ["tag:local"]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headplane
  namespace: headscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headplane
  template:
    metadata:
      labels:
        app: headplane
    spec:
      containers:
        - name: headplane
          image: ghcr.io/tale/headplane:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HEADPLANE_LOAD_ENV_OVERRIDES
              value: "true"
          volumeMounts:
            - name: headplane-config
              mountPath: /etc/headplane
              readOnly: true
            - name: headscale-config
              mountPath: /etc/headscale
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: headplane-config
          configMap:
            name: headplane-config
        - name: headscale-config
          configMap:
            name: headscale-config