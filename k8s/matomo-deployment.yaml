# Production Matomo on EKS — managed by ArgoCD (electgo/matomo helm chart, branch main).
# This manifest is a STANDALONE alternative using the official matomo/matomo Helm chart.
# It mirrors the live DB connection so values stay consistent across repos.
#
# Live source of truth: https://github.com/electgo/matomo (path: helm/matomo)
# DB:    Percona Server MySQL group-replication, ns "database", primary svc mysql-main-mysql-primary
# Hostname: track.electgo.com (Cloudflare proxied → ALB electgo-prod-alb-... → haproxy-ingress)
#
# Deploy (alternative):
#   helm repo add matomo https://helm.matomo.org
#   helm upgrade --install matomo matomo/matomo \
#     --namespace matomo --create-namespace \
#     -f <(kubectl -n matomo get cm matomo-helm-values -o jsonpath='{.data.values\.yaml}')
apiVersion: v1
kind: Namespace
metadata:
  name: matomo
---
apiVersion: v1
kind: Secret
metadata:
  name: matomo-credentials
  namespace: matomo
type: Opaque
stringData:
  admin-password: "Yu$00fSh-Matomo-2026!"
  db-password: "6ZsRjOkvPQyyA4b3!"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: matomo-helm-values
  namespace: matomo
data:
  values.yaml: |
    image:
      tag: "5-apache"

    auth:
      username: yusoofsh
      existingSecret: matomo-credentials
      existingSecretPasswordKey: admin-password

    mariadb:
      enabled: false

    externalDatabase:
      host: mysql-main-mysql-primary.database.svc.cluster.local
      port: 3306
      database: matomo
      user: matomo_user
      existingSecret: matomo-credentials
      existingSecretPasswordKey: db-password
      tablesPrefix: matomo_

    replicaCount: 1

    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "500Mi"
        cpu: "256m"

    ingress:
      enabled: true
      ingressClassName: haproxy
      hostname: track.electgo.com
      annotations:
        haproxy.org/forwarded-for: "true"
        haproxy.org/forwarded-proto: "true"
        haproxy.org/timeout-client: "300s"
        haproxy.org/timeout-server: "300s"
      tls: true
      extraTls:
        - hosts:
            - track.electgo.com
          secretName: track-electgo-com-tls

    persistence:
      enabled: true
      storageClass: gp3-encrypted
      size: 5Gi

    matomoUsername: yusoofsh
    matomoWebsiteName: "ElectGo"
    matomoWebsiteHost: "https://track.electgo.com"
