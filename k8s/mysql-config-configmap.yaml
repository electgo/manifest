# NOTE: This configuration matches Lightsail MySQL 8.0.42 for migration compatibility.
# Known issues for future improvement:
# - default_authentication_plugin is deprecated (MySQL 8.4+), used for app compatibility
# - Timeouts are 8 hours (consider 1 hour for dev)
# - Buffer pool is 512MB (consider 256MB for lightweight environments)
# - Missing slow_query_log configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: database
data:
  my.cnf: |
    [mysqld]
    # Basic settings
    port=3306
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    
    # Performance tuning untuk development
    innodb_buffer_pool_size=1G
    # innodb_redo_log_capacity replaces innodb_log_file_size in MySQL 8.0.30+
    # Migration writes large volumes — 4GB prevents log checkpoint stalls
    innodb_redo_log_capacity=4294967296
    innodb_flush_log_at_trx_commit=2
    innodb_io_capacity=2000
    innodb_io_capacity_max=4000
    
    # Connection settings
    max_connections=100
    wait_timeout=28800
    interactive_timeout=28800
    
    # Logging
    log-error=/var/log/mysql/error.log
    
    # Compatibility dengan MySQL 8.0
    default_authentication_plugin=mysql_native_password
    
    [client]
    port=3306
    default-character-set=utf8mb4
