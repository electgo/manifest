apiVersion: batch/v1
kind: Job
metadata:
  name: magento-install
  namespace: magento
spec:
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: electgo-dev-agent-2
      initContainers: []
      containers:
      - name: magento-installer
        image: magento/magento-cloud-docker-php:8.2-cli-1.3.7
        workingDir: /var/www/magento
        env:
        - name: COMPOSER_HOME
          value: /tmp/composer
        command:
        - /bin/bash
        - -c
        - |
          # Setup composer auth
          mkdir -p /tmp/composer
          cp /tmp/.composer/auth.json /tmp/composer/auth.json
          echo "Auth file contents:"
          cat /tmp/composer/auth.json
          
          # Enable sodium extension
          echo "extension=sodium.so" > /usr/local/etc/php/conf.d/zz-sodium.ini
          php -m | grep -i sodium
          
          # Database should be ready (mysql pod is running)
          echo "Assuming database is ready..."
          
          if [ ! -f /var/www/magento/bin/magento ]; then
            echo "Installing Magento..."
            # Clean directory if not empty
            if [ "$(ls -A /var/www/magento 2>/dev/null)" ]; then
              echo "Directory not empty, cleaning..."
              rm -rf /var/www/magento/*
              rm -rf /var/www/magento/.[!.]*
            fi
            
            cd /var/www/magento
            composer create-project --repository-url=https://repo.magento.com/ magento/project-community-edition:2.4.7 . --no-interaction
            
            # Wait for MySQL to be ready
            sleep 10
            
            bin/magento setup:install \
              --base-url=${MAGENTO_BASE_URL} \
              --db-host=${DB_HOST} \
              --db-name=${DB_NAME} \
              --db-user=${DB_USER} \
              --db-password=${DB_PASSWORD} \
              --admin-firstname=${MAGENTO_ADMIN_FIRSTNAME} \
              --admin-lastname=${MAGENTO_ADMIN_LASTNAME} \
              --admin-email=${MAGENTO_ADMIN_EMAIL} \
              --admin-user=${MAGENTO_ADMIN_USERNAME} \
              --admin-password=${MAGENTO_ADMIN_PASSWORD} \
              --language=en_US \
              --currency=USD \
              --timezone=Asia/Jakarta \
              --use-rewrites=1 \
              --backend-frontname=admin
            
            # Configure Redis for cache and sessions
            bin/magento setup:config:set \
              --cache-backend=redis \
              --cache-backend-redis-server=${REDIS_HOST} \
              --cache-backend-redis-port=${REDIS_PORT} \
              --cache-backend-redis-db=1 \
              --session-save=redis \
              --session-save-redis-host=${REDIS_HOST} \
              --session-save-redis-port=${REDIS_PORT} \
              --session-save-redis-db=2
            
            bin/magento config:set web/secure/use_in_frontend 0
            bin/magento config:set web/secure/use_in_adminhtml 0
            bin/magento cache:flush
            
            echo "Magento installation completed!"
          else
            echo "Magento already installed, skipping installation"
          fi
        envFrom:
        - secretRef:
            name: magento-secrets
        volumeMounts:
        - name: magento-data
          mountPath: /var/www/magento
        - name: composer-auth
          mountPath: /tmp/.composer/auth.json
          subPath: auth.json
      volumes:
      - name: magento-data
        hostPath:
          path: /data/magento
          type: DirectoryOrCreate
      - name: composer-auth
        secret:
          secretName: magento-composer-auth
  backoffLimit: 1
