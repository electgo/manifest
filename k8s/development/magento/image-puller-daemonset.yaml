apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: magento-image-puller
  namespace: magento
spec:
  selector:
    matchLabels:
      name: magento-image-puller
  template:
    metadata:
      labels:
        name: magento-image-puller
    spec:
      tolerations:
      - operator: Exists
      containers:
      - name: image-puller
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          echo "Images will be pulled by kubelet automatically"
          sleep 3600
        resources:
          requests:
            memory: "50Mi"
            cpu: "50m"
      initContainers:
      - name: pull-magento-cli
        image: magento/magento-cloud-docker-php:8.2-cli-1.3.7
        command: ['echo', 'Image pulled successfully']
      - name: pull-magento-fpm
        image: magento/magento-cloud-docker-php:8.2-fpm-1.3.7
        command: ['echo', 'Image pulled successfully']
  updateStrategy:
    type: RollingUpdate
