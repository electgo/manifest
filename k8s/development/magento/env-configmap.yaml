apiVersion: v1
kind: ConfigMap
metadata:
  name: magento-env-config
  namespace: magento
data:
  env.php: |
    <?php
    return [
        'backend' => [
            'frontName' => 'admin'
        ],
        'crypt' => [
            'key' => getenv('MAGENTO_ENCRYPTION_KEY') ?: 'a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6'
        ],
        'db' => [
            'table_prefix' => '',
            'connection' => [
                'default' => [
                    'host' => getenv('DB_HOST') ?: 'magento-mysql.magento.svc.cluster.local',
                    'dbname' => getenv('DB_NAME') ?: 'magento',
                    'username' => getenv('DB_USER') ?: 'magento',
                    'password' => getenv('DB_PASSWORD') ?: 'magento_password_2024',
                    'model' => 'mysql',
                    'engine' => 'innodb',
                    'initStatements' => 'SET NAMES utf8mb4',
                    'active' => '1'
                ]
            ]
        ],
        'resource' => [
            'default_setup' => [
                'module' => 'Magento_Db'
            ]
        ],
        'session' => [
            'save' => 'redis',
            'redis' => [
                'host' => getenv('REDIS_HOST') ?: 'redis-main.database.svc.cluster.local',
                'port' => getenv('REDIS_PORT') ?: '6379',
                'database' => '2',
                'password' => '',
                'compress_data' => '1',
                'compression_lib' => 'gzip'
            ]
        ],
        'cache' => [
            'frontend' => [
                'default' => [
                    'backend' => 'Redis',
                    'backend_options' => [
                        'server' => getenv('REDIS_HOST') ?: 'redis-main.database.svc.cluster.local',
                        'port' => getenv('REDIS_PORT') ?: '6379',
                        'database' => '1'
                    ]
                ]
            ]
        ],
        'system' => [
            'default' => [
                'general' => [
                    'locale' => [
                        'code' => 'en_US'
                    ]
                ]
            ]
        ]
    ];
