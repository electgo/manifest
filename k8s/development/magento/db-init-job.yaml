apiVersion: batch/v1
kind: Job
metadata:
  name: magento-db-setup
  namespace: magento
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mysql-client
        image: mysql:8.0
        command:
        - /bin/bash
        - -c
        - |
          mysql -h percona-mysql.database.svc.cluster.local -uroot -p${MYSQL_ROOT_PASSWORD} <<EOF
          CREATE DATABASE IF NOT EXISTS magento CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
          CREATE USER IF NOT EXISTS 'magento'@'%' IDENTIFIED BY 'magento_password_2024';
          GRANT ALL PRIVILEGES ON magento.* TO 'magento'@'%';
          FLUSH PRIVILEGES;
          EOF
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: percona-credentials
              key: root-password
        - name: MYSQL_PWD
          valueFrom:
            secretKeyRef:
              name: percona-credentials
              key: root-password
  backoffLimit: 3
