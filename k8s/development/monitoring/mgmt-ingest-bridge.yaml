# Bridge from dev cluster to mgmt ingest NodePorts (metrics remote-write
# + loki push). Targets static mgmt node IPs; update the Endpoints when
# mgmt nodes change (same caveat as the matomo-db and prod-grafana
# bridges).
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-mgmt-rw
  namespace: monitoring
spec:
  ports:
    - name: http-web
      port: 9090
      targetPort: 30990
---
apiVersion: v1
kind: Endpoints
metadata:
  name: prometheus-mgmt-rw
  namespace: monitoring
subsets:
  - addresses:
      - ip: 10.20.20.47
      - ip: 10.20.20.133
      - ip: 10.20.24.139
      - ip: 10.20.28.67
      - ip: 10.20.17.172
      - ip: 10.20.27.78
      - ip: 10.20.16.206
      - ip: 10.20.30.185
    ports:
      - name: http-web
        port: 30990
---
apiVersion: v1
kind: Service
metadata:
  name: loki-mgmt
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 3100
      targetPort: 30311
---
apiVersion: v1
kind: Endpoints
metadata:
  name: loki-mgmt
  namespace: monitoring
subsets:
  - addresses:
      - ip: 10.20.20.47
      - ip: 10.20.20.133
      - ip: 10.20.24.139
      - ip: 10.20.28.67
      - ip: 10.20.17.172
      - ip: 10.20.27.78
      - ip: 10.20.16.206
      - ip: 10.20.30.185
    ports:
      - name: http
        port: 30311
