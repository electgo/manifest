# Direct PG STS for k3s-dev (replaces CNPG Cluster CR).
# Apply when keycloak/other dev workload needs local PG instead of prod n8n_development.
# Reuses postgres-main-user secret from k8s/postgres-cluster.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-main-init
  namespace: database
data:
  init.sql: |
    ALTER ROLE platform_user CREATEROLE;
    CREATE ROLE n8n_master WITH LOGIN PASSWORD '9irGTjR0COWxPp048OBZggrP';
    GRANT n8n_master TO platform_user;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-main
  namespace: database
spec:
  serviceName: postgres-main-rw
  replicas: 1
  selector:
    matchLabels:
      app: postgres-main
  template:
    metadata:
      labels:
        app: postgres-main
    spec:
      containers:
      - name: postgres
        image: postgres:17.6
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-main-user
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-main-user
              key: password
        - name: POSTGRES_DB
          value: postgres
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests: { memory: "512Mi", cpu: "250m" }
          limits:   { memory: "1Gi",   cpu: "1000m" }
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        readinessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d postgres"]
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: init
        configMap:
          name: postgres-main-init
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      storageClassName: local-path
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-main-rw
  namespace: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres-main
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-main-ro
  namespace: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres-main
