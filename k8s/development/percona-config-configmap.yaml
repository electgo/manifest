apiVersion: v1
kind: ConfigMap
metadata:
  name: percona-config
  namespace: database
data:
  my.cnf: |
    [mysqld]
    server-id=1
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    port=3306
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    max_connections=200
    wait_timeout=28800
    interactive_timeout=28800
    # Drop ONLY_FULL_GROUP_BY for legacy CodeIgniter app (pim_master)
    sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
