apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-main
  namespace: database
  labels:
    app: redis-main
spec:
  serviceName: redis-main
  replicas: 1
  selector:
    matchLabels:
      app: redis-main
  template:
    metadata:
      labels:
        app: redis-main
    spec:
      containers:
      - name: redis
        # Source: MongoDB_Dev (52.74.252.4) Redis 7.0.15 — exact match
        # Note: JagoanHosting Redis 6.0.16 (cache only) → upgrading to 7.0 is safe (no persistent data to migrate)
        image: redis:7.0.15
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - /etc/redis/redis.conf
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 15
          periodSeconds: 20
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: password
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /etc/redis
      volumes:
      - name: config
        configMap:
          name: redis-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      storageClassName: local-path
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: database
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    requirepass ElectGoRedis7Dev2026!
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
    dir /data
    save 900 1
    save 300 10
    save 60 10000
---
apiVersion: v1
kind: Service
metadata:
  name: redis-main
  namespace: database
  labels:
    app: redis-main
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: redis-main
