# NodePort ingest endpoints for downstream Alloy agents.
# Metrics remote-write to Mimir, logs push to Loki, traces push to Tempo.
# SG: allow 30990/30311/30317/30318 only from dev/prod node SGs.
apiVersion: v1
kind: Service
metadata:
  name: mimir-gateway-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: gateway
  ports:
    - name: http-metrics
      port: 80
      targetPort: http-metrics
      nodePort: 30990
---
apiVersion: v1
kind: Service
metadata:
  name: loki-push-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: loki
    release: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
      nodePort: 30311
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-otlp-grpc-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: tempo
  ports:
    - name: grpc-tempo-otlp
      port: 4317
      targetPort: 4317
      nodePort: 30317
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-otlp-http-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: tempo
  ports:
    - name: tempo-otlp-http
      port: 4318
      targetPort: 4318
      nodePort: 30318
