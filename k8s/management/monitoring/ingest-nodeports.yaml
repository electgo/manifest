# NodePort ingest endpoints for the dev cluster (Alloy): metrics
# remote-write to mgmt Prometheus and log push to mgmt Loki.
# SG: mgmt node SG sg-07dd21f853f46a3de allows 30990/30311 only from
# dev node SG sg-0a416f617b311fbc2. Dev side bridges via
# k8s/development/monitoring/mgmt-ingest-bridge.yaml.
apiVersion: v1
kind: Service
metadata:
  name: prometheus-rw-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: prometheus-kube-prometheus-prometheus
  ports:
    - name: http-web
      port: 9090
      targetPort: 9090
      nodePort: 30990
---
apiVersion: v1
kind: Service
metadata:
  name: loki-push-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: loki
    release: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
      nodePort: 30311
