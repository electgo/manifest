            "showHeader": true
          },
          "targets": [
            {
              "expr": "kube_job_owner{owner_kind=\"CronJob\", owner_name=~\"$cronjob\", namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "refId": "owner"
            },
            {
              "expr": "kube_job_status_start_time{namespace=~\"$namespace\"} * 1000",
              "format": "table",
              "instant": true,
              "refId": "start"
            },
            {
              "expr": "kube_job_status_completion_time{namespace=~\"$namespace\"} * 1000",
              "format": "table",
              "instant": true,
              "refId": "compl"
            },
            {
              "expr": "kube_job_status_succeeded{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "refId": "succ"
            },
            {
              "expr": "kube_job_status_failed{namespace=~\"$namespace\"}",
              "format": "table",
              "instant": true,
              "refId": "fail"
            }
          ],
          "title": "Job runs (last 24h) — click a row to drill into its pod logs",
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": {
                "byField": "job_name"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true,
                  "Time 5": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace 2": true,
                  "namespace 3": true,
                  "namespace 4": true,
                  "namespace 5": true,
                  "owner_is_controller": true,
                  "owner_kind": true,
                  "owner_name 1": true,
                  "owner_name 2": true,
                  "owner_name 3": true,
                  "owner_name 4": true,
                  "owner_name 5": true,
                  "pod": true,
                  "service": true,
                  "uid": true
                },
                "indexByName": {
                  "Value #compl": 4,
                  "Value #fail": 6,
                  "Value #start": 3,
                  "Value #succ": 5,
                  "job_name": 1,
                  "namespace 1": 0,
                  "owner_name": 2
                },
                "renameByName": {
                  "Value #compl": "completed",
                  "Value #fail": "failed",
                  "Value #start": "started",
                  "Value #succ": "succeeded",
                  "namespace 1": "ns",
                  "owner_name": "cronjob"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green"
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "none"
            }
          },
          "gridPos": {
            "h": 12,
            "w": 12,
            "x": 12,
            "y": 42
          },
          "id": 36,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "sum by (owner_name) (increase(kube_job_status_failed[24h]) * on(namespace,job_name) group_left(owner_name) kube_job_owner{owner_kind=\"CronJob\", owner_name=~\"$cronjob\", namespace=~\"$namespace\"})",
              "legendFormat": "failed: {{owner_name}}"
            },
            {
              "expr": "sum by (owner_name) (increase(kube_job_status_succeeded[24h]) * on(namespace,job_name) group_left(owner_name) kube_job_owner{owner_kind=\"CronJob\", owner_name=~\"$cronjob\", namespace=~\"$namespace\"})",
              "legendFormat": "succeeded: {{owner_name}}"
            }
          ],
          "title": "Selected CronJob — runs / fails (24h)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 16,
            "w": 24,
            "x": 0,
            "y": 54
          },
          "id": 40,
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=~\"$namespace\", pod=~\"$cronjob-.*\"}"
            }
          ],
          "title": "Pod logs for $cronjob (namespace $namespace)",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 70
          },
          "id": 41,
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=~\"$namespace\"} |~ \"(?i)error|fatal|panic|exception\""
            }
          ],
          "title": "Errors only across selected namespaces",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "electgo",
