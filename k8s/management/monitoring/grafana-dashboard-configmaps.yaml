            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace)(increase(kube_pod_container_status_restarts_total{cluster=\"development\",namespace!~\"kube-system|cattle-.*|cert-manager|kube-flannel|kube-node-lease|kube-public|monitoring|nfs-subdir|haproxy-ingress|local|default\"}[1h])) > 0",
              "legendFormat": "{{namespace}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Error lines by namespace (5m)",
          "gridPos": {
            "x": 12,
            "y": 21,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "loki-mgmt"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(15, sum by (namespace)(count_over_time({cluster=\"development\",namespace!~\"kube-system|cattle-.*|cert-manager|kube-flannel|kube-node-lease|kube-public|monitoring|nfs-subdir|haproxy-ingress|local|default\"} |~ `(?i)(error|fatal|panic|exception)` [5m])))",
              "legendFormat": "{{namespace}}",
              "datasource": {
                "type": "loki",
                "uid": "loki-mgmt"
              },
              "queryType": "range"
            }
          ]
        }
