            "refresh": 2,
            "type": "query"
          },
          {
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "includeAll": true,
            "multi": true,
            "name": "cronjob",
            "query": "label_values(kube_cronjob_info{namespace=~\"$namespace\"}, cronjob)",
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timezone": "Asia/Jakarta",
      "title": "ElectGo Production / Cronjobs & Jobs",
      "uid": "electgo-cronjobs",
      "version": 4
