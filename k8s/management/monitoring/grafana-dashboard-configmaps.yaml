apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-electgo-prod-app-detail
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: otel-lgtm
data:
  electgo-prod-app-detail.json: |-
    {
      "uid": "electgo-prod-app-detail",
      "title": "ElectGo Production / App Detail",
      "tags": [
        "electgo",
        "production",
        "apps"
      ],
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "project",
            "type": "custom",
            "query": "product : n8n|pim-bucket-upload|pim-chatbot|pim-master|pim-partners-bundling|pim-sku-finder|pim-websocket|product-ai-enrich",
            "current": {
              "text": "product",
              "value": "n8n|pim-bucket-upload|pim-chatbot|pim-master|pim-partners-bundling|pim-sku-finder|pim-websocket|product-ai-enrich"
            },
            "includeAll": false,
            "multi": false,
            "label": "Project",
            "options": [
              {
                "selected": true,
                "text": "product",
                "value": "n8n|pim-bucket-upload|pim-chatbot|pim-master|pim-partners-bundling|pim-sku-finder|pim-websocket|product-ai-enrich"
              }
            ]
          },
          {
            "name": "app",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "query": "label_values(kube_pod_info{cluster=\"production\",namespace=~\"${project:raw}\"}, namespace)",
            "current": {
              "text": "pim-master",
              "value": "pim-master"
            },
            "includeAll": false,
            "multi": false,
            "label": "App"
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "query": "label_values(kube_pod_info{cluster=\"production\",namespace=\"$app\"}, pod)",
            "current": {
              "text": "All",
              "value": ".*"
            },
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "label": "Pod"
          },
          {
            "name": "container",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 2,
            "query": "label_values(kube_pod_container_info{cluster=\"production\",namespace=\"$app\",pod=~\"${pod:raw}\",container!=\"\"}, container)",
            "current": {
              "text": "All",
              "value": ".*"
            },
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "label": "Container"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Pods running",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 3,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "graphMode": "area",
            "colorMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{cluster=\"production\",namespace=\"$app\",phase=\"Running\"})",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pods not running",
          "gridPos": {
            "x": 3,
            "y": 0,
            "w": 3,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "graphMode": "area",
            "colorMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{cluster=\"production\",namespace=\"$app\",phase=~\"Pending|Failed|Unknown\"})",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
