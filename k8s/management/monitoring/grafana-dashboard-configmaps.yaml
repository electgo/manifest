apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-electgo-logs-mgmt-dev
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: otel-lgtm
data:
  electgo-logs-mgmt-dev.json: |-
    {
      "uid": "electgo-logs-mgmt-dev",
      "title": "Logs / Mgmt + Dev",
      "tags": [
        "electgo",
        "logs"
      ],
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "cluster",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki-mgmt"
            },
            "refresh": 2,
            "query": "label_values(cluster)",
            "current": {
              "text": "management",
              "value": "management"
            },
            "includeAll": false,
            "multi": false,
            "label": "Cluster"
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki-mgmt"
            },
            "refresh": 2,
            "query": "label_values({cluster=\"$cluster\"}, namespace)",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "includeAll": true,
            "multi": true,
            "label": "Namespace"
          },
          {
            "name": "search",
            "type": "textbox",
            "current": {
              "text": "",
              "value": ""
            },
            "label": "Search",
            "query": ""
          }
        ]
