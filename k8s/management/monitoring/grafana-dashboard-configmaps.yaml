          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (namespace)(kube_pod_info{cluster=\"production\",namespace!~\"kube-system|cattle-.*|cert-manager|kube-flannel|kube-node-lease|kube-public|monitoring|nfs-subdir|haproxy-ingress|local|default\"}))",
