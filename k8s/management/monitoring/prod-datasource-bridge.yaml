# Bridge from mgmt-cluster Grafana to prod EKS Prometheus + Loki
# (centralized dashboards). Targets prod node IPs on NodePorts opened by
# k8s/production/services/monitoring-internal-nodeport.yaml; SG rule on
# sg-002a0ca20776af7f4 allows 30090/30310 from mgmt SG sg-07dd21f853f46a3de.
# CAVEAT: prod node IPs are static here; update when prod nodes are replaced
# (same pattern as matomo-db bridge, opposite direction).
apiVersion: v1
kind: Service
metadata:
  name: prometheus-prod
  namespace: monitoring
spec:
  ports:
    - name: http-web
      port: 9090
      targetPort: 30090
---
apiVersion: v1
kind: Endpoints
metadata:
  name: prometheus-prod
  namespace: monitoring
subsets:
  - addresses:
      - ip: 10.20.25.39
      - ip: 10.20.47.200
      - ip: 10.20.77.70
    ports:
      - name: http-web
        port: 30090
---
apiVersion: v1
kind: Service
metadata:
  name: loki-prod
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 3100
      targetPort: 30310
---
apiVersion: v1
kind: Endpoints
metadata:
  name: loki-prod
  namespace: monitoring
subsets:
  - addresses:
      - ip: 10.20.25.39
      - ip: 10.20.47.200
      - ip: 10.20.77.70
    ports:
      - name: http
        port: 30310
